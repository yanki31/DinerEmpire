function hireAccountant() {
  if (coins < accountantCost*3) { notify('Yetersiz para!'); return; }
  hasAccountant = true;
  notify('📊 Muhasebeci işe başladı! Vergi: %' + Math.round(calcTaxRate()*100));
  bAcc();
}
function fireAccountant() {
  hasAccountant = false;
  notify('📊 Muhasebeci ayrıldı.');
  bAcc();
}

/* INIT */

/* ══ PROGRESSION SİSTEMİ ══ */
// Her günde hangi özellikler aktif?
function isFeatureUnlocked(feature) {
  switch(feature) {
    case 'wages':       return dayNum >= 2;
    case 'spoilage':    return dayNum >= 3;
    case 'warehouse':   return dayNum >= 3;
    case 'tax':         return dayNum >= 5;
    case 'prep':        return dayNum >= 7;
    case 'accountant':  return dayNum >= 10;
    default: return true;
  }
}

// Açılış mesajları
const UNLOCK_MSGS = {
  2:  "💼 Calisanlar aktif! Her gun maas odemek gerekecek.",
  3:  "📦 Depo sistemi acildi! Malzemeler artik bozulabilir.",
  5:  "🏛️ Vergi aktif! Her 2 dakikada gelirin %12si.",
  7:  "🍳 On hazirlik acildi! Bazi yemekler hazirlik ister.",
  10: "📊 Muhasebeci kiralayabilirsin! Vergiyi %7'ye düşürür.",
};

function checkUnlocks() {
  const msg = UNLOCK_MSGS[dayNum];
  if (msg) {
    setTimeout(() => {sfx('unlock');notify('🔓 YENİ: ' + msg);}, 1000);
  }
}

/* ══ MALZEME SİPARİŞ SİSTEMİ (GÜN SONU) ══ */
// Gün sonunda otomatik sipariş ekranı
let pendingOrder = {}; // {key: qty}

function showOrderScreen() {
  // Sadece gün 3+ aktif
  if (!isFeatureUnlocked('warehouse')) {
    // Gün 1-2: sonsuz stok, sipariş yok
    closeM('m-fin');
    restartCustSpawn();
    return;
  }
  
  // Stok analizi — neye ihtiyaç var?
  pendingOrder = {};
  const suggestions = [];
  
  // Menüdeki tariflerin malzemelerini analiz et
  menu.forEach(ri => {
    const rec = RCP[ri];
    [...rec.i, ...(rec.prep||[])].forEach(key => {
      if (!ING[key]) return;
      const stock = ING[key].q;
      const minNeeded = 8; // minimum stok
      if (stock < minNeeded) {
        const needed = minNeeded - stock;
        suggestions.push({ key, needed, v: ING[key] });
      }
    });
  });

  // Sipariş ekranını göster
  const modal = document.getElementById('m-order');
  if (!modal) return;
  
  const c = document.getElementById('c-order');
  const multi = restType ? REST_TYPES[restType].ingCostMulti : 1;
  
  // Grupsız sıralama - önce kritik stoklar
  suggestions.sort((a,b) => a.needed - b.needed);
  
  c.innerHTML = `
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:8px;color:#888;font-family:'Press Start 2P',monospace">GÜN ${dayNum} SİPARİŞ</div>
      <div style="font-size:7px;color:#555;margin-top:3px">Yarın için ne almak istersin?</div>
    </div>
    
    ${suggestions.length === 0 
      ? '<div style="text-align:center;color:#4cb84c;padding:10px;font-size:8px">✓ Tüm stoklar yeterli!</div>'
      : `<div style="font-size:7px;color:#f5c842;margin-bottom:6px;font-family:'Press Start 2P',monospace">⚠️ DÜŞÜK STOK:</div>
         <div id="order-items">` + suggestions.slice(0,8).map(s => {
           const unitCost = Math.round(s.v.c * multi);
           const suggestQty = Math.max(s.needed, 5);
           const totalCost = unitCost * suggestQty;
           return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)">
             <span style="font-size:16px">${s.v.e}</span>
             <div style="flex:1">
               <div style="font-size:8px;color:#ddd;font-family:monospace">${s.v.n}</div>
               <div style="font-size:7px;color:#888">Stok: ${ING[s.key].q} | Min: 8</div>
             </div>
             <div style="display:flex;align-items:center;gap:4px">
               <button onclick="adjOrder('${s.key}',-5)" style="width:20px;height:20px;background:#380000;border:1px solid #c84444;color:#f08080;cursor:pointer;border-radius:2px;font-size:10px">-</button>
               <span id="ord-qty-${s.key}" style="font-size:9px;font-weight:bold;color:#f5c842;font-family:'Press Start 2P',monospace;min-width:20px;text-align:center">${pendingOrder[s.key]||suggestQty}</span>
               <button onclick="adjOrder('${s.key}',5)" style="width:20px;height:20px;background:#143010;border:1px solid #40b018;color:#60e030;cursor:pointer;border-radius:2px;font-size:10px">+</button>
             </div>
             <div style="text-align:right">
               <div style="font-size:7px;color:#c84444">${totalCost}G</div>
               <input type="checkbox" id="ord-cb-${s.key}" ${coins>=totalCost?'checked':''} onchange="updateOrderTotal()" style="margin-top:2px">
             </div>
           </div>`;
         }).join('') + '</div>'
    }
    
    <div style="margin-top:8px;padding:8px;background:#14142a;border-radius:4px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:8px;color:#888">Toplam sipariş:</span>
        <span id="order-total" style="font-size:9px;font-weight:bold;color:#f5c842;font-family:'Press Start 2P',monospace">0G</span>
      </div>
      <div style="font-size:7px;color:#555">Kasa: ${coins}G</div>
    </div>
    
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="rbtn" style="flex:1;padding:6px 0" onclick="skipOrder()">ATLAT</button>
      <button class="gbtn" style="flex:2;padding:6px 0" onclick="confirmOrder()" id="confirm-order-btn">SİPARİŞ VER</button>
    </div>
  `;
  
  // Init pending orders with suggestions
  suggestions.slice(0,8).forEach(s => {
    const suggestQty = Math.max(s.needed, 5);
    pendingOrder[s.key] = suggestQty;
  });
  updateOrderTotal();
  
  modal.classList.add('open');
}

function adjOrder(key, delta) {
  pendingOrder[key] = Math.max(0, (pendingOrder[key]||0) + delta);
  const el = document.getElementById('ord-qty-'+key);
  if(el) el.textContent = pendingOrder[key];
  updateOrderTotal();
}

function updateOrderTotal() {
  const multi = restType ? REST_TYPES[restType].ingCostMulti : 1;
  let total = 0;
  Object.entries(pendingOrder).forEach(([key, qty]) => {
    const cb = document.getElementById('ord-cb-'+key);
    if(cb && cb.checked && ING[key]) {
      total += Math.round(ING[key].c * qty * multi);
    }
  });
  const el = document.getElementById('order-total');
  if(el) el.textContent = total + 'G';
  const btn = document.getElementById('confirm-order-btn');
  if(btn) btn.disabled = total > coins;
}

function confirmOrder() {
  const multi = restType ? REST_TYPES[restType].ingCostMulti : 1;
  let bought = [];
  Object.entries(pendingOrder).forEach(([key, qty]) => {
    if(qty <= 0) return;
    const cb = document.getElementById('ord-cb-'+key);
    if(cb && !cb.checked) return;
    const loc = ING[key]?.fridge ? 'fridge' : 'shelf';
    if(buyIngredient(key, qty, loc)) {
      bought.push(ING[key].e + ' ×' + qty);
    }
  });
  if(bought.length > 0) notify('📦 Sipariş verildi: ' + bought.slice(0,3).join(', '));
  document.getElementById('m-order').classList.remove('open');
  restartCustSpawn();
}

function skipOrder() {
  document.getElementById('m-order').classList.remove('open');
  restartCustSpawn();
}


/* ══ ERKEN OYUN: SONSUZ STOK ══ */
// Gün 1-2'de malzeme bitmez, gün 3'te gerçek sistem devreye girer
const _realUseIngredient = useIngredient;
useIngredient = function(key, qty) {
  if (!isFeatureUnlocked('spoilage')) {
    // Erken oyun: sadece q degerini azalt, warehouse kullanma
    if (ING[key]) ING[key].q = Math.max(0, ING[key].q - qty);
    return;
  }
  _realUseIngredient(key, qty);
};

// Erken oyun başlangıç stoku
function initEarlyStock() {
  Object.keys(ING).forEach(key => {
    if (ING[key].cat !== 'prep') {
      ING[key].q = 20; // Başlangıç stoku
      warehouse[key] = [{qty: 20, expiresDay: 9999, location: 'shelf'}];
    }
  });
}

// Vergi sadece açıldıysa çalışsın
const _realTaxInterval = setInterval;
// Override addTaxableIncome
const _realAddTaxable = addTaxableIncome;
addTaxableIncome = function(amount) {
  if (!isFeatureUnlocked('tax')) return; // vergi yokken biriktirme
  _realAddTaxable(amount);
};

resize();buildWB();hudU();requestAnimationFrame(draw);
// Start screen
initStartScreen();
