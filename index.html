<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Restaurant City</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#111}
canvas{position:fixed;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#hud{position:fixed;top:0;left:0;right:0;height:48px;z-index:100;background:#0a0a14;border-bottom:3px solid #f5c842;display:flex;align-items:center;gap:4px;padding:0 7px}
.pill{display:flex;align-items:center;gap:3px;background:#000;border:2px solid #f5c842;border-radius:3px;padding:2px 8px 2px 4px;flex-shrink:0}
.pv{font-size:10px;font-weight:bold;color:#f5c842;font-family:'Press Start 2P',monospace}
.pi{font-size:13px}
.btn{border:2px solid;color:#fff;font-size:7px;font-weight:bold;padding:3px 5px;cursor:pointer;white-space:nowrap;font-family:'Press Start 2P',monospace;border-radius:2px}
.btn:active{filter:brightness(.7)}
.bg{background:#143010;border-color:#40b018;color:#60e030}
.bo{background:#381e00;border-color:#b88018;color:#e8b030}
.bp{background:#200038;border-color:#9030b8;color:#d060f0}
.bb{background:#001430;border-color:#2870c0;color:#50a0f0}
.br{background:#380000;border-color:#b02828;color:#f05050}
#xpw{flex:1;max-width:90px;height:11px;background:#000;border:2px solid #f5c842;position:relative;border-radius:2px}
#xpf{height:100%;background:#f5c842;border-radius:1px;transition:width .4s}
#xpt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:6px;color:#000;font-family:'Press Start 2P',monospace;font-weight:bold}
#lvt{font-size:14px;font-weight:bold;color:#f5c842;font-family:'Press Start 2P',monospace;min-width:16px;text-align:center}
#bbar{position:fixed;bottom:0;left:0;right:0;height:96px;z-index:100;background:#0a0a14;border-top:3px solid #f5c842;display:flex;align-items:center;gap:3px;padding:0 4px}
.ws{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.wp{width:58px;height:58px;border:2px solid #3a2010;display:flex;align-items:center;justify-content:center;position:relative;background:#0a0a14;border-radius:3px;overflow:hidden;image-rendering:pixelated}
.wp:hover{border-color:#f5c842}.wp.busy{border-color:#5cb85c;box-shadow:0 0 6px #5cb85c55}
.wdot{position:absolute;top:3px;right:3px;width:7px;height:7px;border:1.5px solid #000;border-radius:1px}
.di{background:#333}.db{background:#5cb85c}
.wname{font-size:6px;font-weight:bold;color:#aaa;width:62px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Press Start 2P',monospace}
.wrole{font-size:5px;font-weight:bold;padding:1px 3px;border-radius:2px}
.rCh{background:#b06808;color:#fff8d8}.rWa{background:#207848;color:#d0fff0}.rJa{background:#404898;color:#d8d8ff}.rBa{background:#983090;color:#ffd8f8}
.hbtn{flex-shrink:0;width:64px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
.hbox{width:58px;height:58px;background:#0a0a14;border:2px dashed #3a2010;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border-radius:3px}
.hbox:hover{border-color:#f5c842}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:500;align-items:center;justify-content:center}
.mo.open{display:flex}
.mb{background:#0a0a14;border:3px solid #f5c842;padding:14px;min-width:280px;max-width:360px;width:92%;max-height:80vh;overflow-y:auto;position:relative;border-radius:3px}
.mb::-webkit-scrollbar{width:4px}.mb::-webkit-scrollbar-thumb{background:#f5c842}
.mt{font-size:10px;font-weight:bold;color:#f5c842;text-align:center;margin-bottom:11px;font-family:'Press Start 2P',monospace;letter-spacing:2px}
.mc{position:absolute;top:9px;right:11px;background:none;border:none;color:#f5c842;font-size:18px;cursor:pointer}
.mcard{background:#14142a;border:1.5px solid rgba(245,200,66,.22);padding:7px 9px;display:flex;align-items:center;gap:7px;margin-bottom:5px;border-radius:3px}
.mcard:hover{border-color:#f5c842}
.mcard .em{font-size:22px;flex-shrink:0}.mcard .inf{flex:1}
.mcard .nm{font-size:9px;font-weight:bold;color:#ddd;font-family:'Press Start 2P',monospace}
.mcard .ds{font-size:8px;color:#777;margin-top:2px}.mcard .pr{font-size:9px;color:#e07030;margin-top:2px}
.gbtn{background:#143010;border:2px solid #40b018;color:#60e030;font-size:7px;font-weight:bold;padding:3px 8px;cursor:pointer;font-family:'Press Start 2P',monospace;border-radius:2px}
.gbtn:disabled{background:#1a1a1a;border-color:#333;color:#444;cursor:not-allowed}
.rbtn{background:#380000;border:2px solid #b02828;color:#f05050;font-size:7px;font-weight:bold;padding:3px 8px;cursor:pointer;font-family:'Press Start 2P',monospace;border-radius:2px}
.fr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(245,200,66,.07)}
.fr:last-child{border-bottom:none}.fl{font-size:8px;color:#888}.fv{font-size:8px;font-weight:bold;font-family:'Press Start 2P',monospace}
.fg{color:#4cb84c}.frd{color:#c84444}.fy{color:#f5c842}
.fsec{font-size:8px;font-weight:bold;color:#f5c842;margin:7px 0 2px;font-family:'Press Start 2P',monospace}
.tabrow{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:7px}
.tabb{background:#0a0a14;border:1.5px solid rgba(245,200,66,.22);color:#666;font-size:7px;font-weight:bold;padding:2px 6px;cursor:pointer;font-family:'Press Start 2P',monospace;border-radius:2px}
.tabb.act{background:#180e00;border-color:#f5c842;color:#f5c842}
.igrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:5px}
.ic{background:#14142a;border:1.5px solid rgba(245,200,66,.18);padding:5px 2px;text-align:center;cursor:pointer;border-radius:2px}
.ic:hover{border-color:#f5c842}
.qo{display:block;width:100%;padding:6px 9px;margin:3px 0;border:1.5px solid rgba(245,200,66,.18);background:#14142a;color:#bbb;font-size:9px;font-weight:bold;cursor:pointer;text-align:left;border-radius:2px}
.qo:hover{background:#180e00}.qo.ok{background:#001400;border-color:#4cb84c;color:#80f080}.qo.no{background:#140000;border-color:#c84444;color:#f08080}
#notif{position:fixed;top:55px;left:50%;transform:translateX(-50%);background:#0a0a14;border:2px solid #f5c842;padding:5px 12px;font-size:8px;font-weight:bold;color:#f5c842;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;font-family:'Press Start 2P',monospace;border-radius:3px}
#notif.show{opacity:1}
</style>
</head>
<body>

<!-- BAŞLANGIÇ EKRANI -->
<div id="start-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#0a0a14,#1a1a2e);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px">
  <div style="text-align:center;margin-bottom:24px">
    <div style="font-size:40px;margin-bottom:8px">🍽️</div>
    <div style="font-size:14px;font-weight:bold;color:#f5c842;font-family:'Press Start 2P',monospace;letter-spacing:2px">RESTAURANT CITY</div>
    <div style="font-size:8px;color:#888;margin-top:6px;font-family:monospace">Restoran tipini seç</div>
  </div>
  <div id="type-cards" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:600px">
  </div>
  <div style="margin-top:20px;font-size:8px;color:#555;font-family:monospace;text-align:center">
    Daha sonra değiştiremezsin — dikkatli seç!
  </div>
</div>

<canvas id="c"></canvas>
<div id="hud">
  <div class="pill"><span class="pi">🪙</span><span class="pv" id="hc">500</span></div>
  <div class="pill"><span class="pi">⭐</span><span class="pv" id="hg">0GP</span></div>
  <button class="btn bg" onclick="openM('menu')">MENU</button>
  <button class="btn bo" onclick="openM('ing')">MALZ</button>
  <button class="btn bp" onclick="openM('ext')">BAHCE</button>
  <button class="btn bb" onclick="openM('deco')">DEKOR</button>
  <button class="btn" style="background:#1a1420;border-color:#9040d0;color:#c070f8;font-size:7px;padding:3px 5px" onclick="openM('furniture')">🪑</button>
  <button class="btn" id="edit-btn" style="background:#1a1a28;border-color:#6080a0;color:#90b0d0;font-size:7px;padding:3px 5px" onclick="toggleEdit()">✏️</button>
  <button class="btn" id="sfx-btn" style="background:#1a1a28;border-color:#a09040;color:#d0c070;font-size:7px;padding:3px 5px" onclick="toggleSfx()">🔊</button>
  <button class="btn" style="background:#202040;border-color:#6060c0;color:#a0a0f0;font-size:7px;padding:3px 5px" onclick="openM('acc')">📊</button>
  <button class="btn br" onclick="openM('quiz')">QUIZ</button>
  <div id="xpw"><div id="xpf" style="width:0%"></div><div id="xpt">0/100</div></div>
  <div id="lvt">1</div>
  <div class="pill" id="day-pill" onclick="openM('fin')" style="cursor:pointer">
    <span class="pi">📅</span><span class="pv" id="hday">G1</span>
  </div>
  <div class="pill"><span class="pi">😊</span><span class="pv" id="hh">100%</span></div>
  <div class="pill" id="rating-pill" style="cursor:pointer" onclick="openM('fin')">
    <span class="pi">⭐</span><span class="pv" id="hrating">—</span>
  </div>
</div>
<div id="bbar">
  <div style="color:#f5c842;font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0" onclick="WB.scrollLeft-=80">◀</div>
  <div id="wb" style="display:flex;align-items:center;gap:3px;overflow:hidden;flex:1"></div>
  <div class="hbtn" onclick="openM('hire')">
    <div class="hbox"><span style="font-size:18px">👥</span><span style="font-size:6px;color:#f5c842;font-family:'Press Start 2P',monospace;text-align:center;line-height:1.4">ISE<br>AL</span></div>
    <div style="font-size:5px;color:#555;font-family:'Press Start 2P',monospace">HIRE</div>
  </div>
  <div style="color:#f5c842;font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0" onclick="WB.scrollLeft+=80">▶</div>
</div>
<div class="mo" id="m-menu"><div class="mb"><button class="mc" onclick="closeM('m-menu')">✕</button><div class="mt">MENU</div><div id="c-menu"></div></div></div>
<div class="mo" id="m-ing"><div class="mb"><button class="mc" onclick="closeM('m-ing')">✕</button><div class="mt">MALZEME</div><div id="c-ing"></div></div></div>
<div class="mo" id="m-ext"><div class="mb"><button class="mc" onclick="closeM('m-ext')">✕</button><div class="mt">BAHCE</div><div id="c-ext"></div></div></div>
<div class="mo" id="m-deco"><div class="mb"><button class="mc" onclick="closeM('m-deco')">✕</button><div class="mt">DEKOR</div><div id="c-deco"></div></div></div>
<div class="mo" id="m-quiz"><div class="mb"><button class="mc" onclick="closeM('m-quiz')">✕</button><div class="mt">QUIZ</div><div id="c-quiz"></div></div></div>
<div class="mo" id="m-hire"><div class="mb"><button class="mc" onclick="closeM('m-hire')">✕</button><div class="mt">ISE AL</div><div id="c-hire"></div></div></div>
<div class="mo" id="m-wdet"><div class="mb"><button class="mc" onclick="closeM('m-wdet')">✕</button><div class="mt">CALISSAN</div><div id="c-wdet"></div></div></div>
<div class="mo" id="m-fin"><div class="mb"><button class="mc" onclick="closeM('m-fin')">✕</button><div class="mt">FINANS</div><div id="c-fin"></div></div>
<div class="mo" id="m-acc"><div class="mb"><button class="mc" onclick="closeM('m-acc')">✕</button><div class="mt">MUHASEBECİ</div><div id="c-acc"></div></div></div>
</div>

<div class="mo" id="m-order"><div class="mb" style="max-width:400px"><div class="mt">📦 MALZEME SİPARİŞİ</div><div id="c-order"></div></div></div>
<div class="mo" id="m-furniture"><div class="mb"><button class="mc" onclick="closeM('m-furniture')">✕</button><div class="mt">🪑 MOBİLYA</div><div id="c-furniture"></div></div></div>
<div id="notif"></div>
<script>
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=r||0;this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();
  };
}

/* Player_Actions layout (32x32 tiles):
   Row 0: Walk DOWN  frame 0-5  (6 frames, top half of sprite)
   Row 1: Walk DOWN  frame 0-5  (6 frames, bottom half)
   Row 2: Walk LEFT  frame 0-5
   Row 3: Walk LEFT  frame 0-5 (bottom)
   Row 4: Walk RIGHT frame 0-5
   Row 5: Walk RIGHT frame 0-5 (bottom)
   Row 6: Walk UP    frame 0-3  (4 frames, top)
   Row 7: Walk UP    frame 0-3  (bottom)
   Row 8: Special    frame 0-3
   Row 9: Special    frame 0-3
   
   Full character = 2 rows stacked (32x64 per frame)
   Draw: top row = rows[dir*2], bot row = rows[dir*2+1]
*/
const WALK_FRAMES = {
  down:  {row:0, frames:6},
  left:  {row:2, frames:6},
  right: {row:4, frames:6},
  up:    {row:6, frames:4},
};

// Draw a full character sprite (32x64) from Player_Actions
// dir: 'down'|'left'|'right'|'up', frame: 0-5
// dx,dy: top-left destination, S: scale
function drawChar(dir, frame, dx, dy, S) {
  const img = IMG['PA'];
  if(!img||!img.complete||!img.naturalWidth) return false;
  const d = WALK_FRAMES[dir] || WALK_FRAMES.down;
  const f = frame % d.frames;
  const sx = f * 32;
  const dw = 32*S, dh = 32*S;
  G.imageSmoothingEnabled = false;
  // Top half
  G.drawImage(img, sx, d.row*32, 32, 32, Math.round(dx), Math.round(dy), dw, dh);
  // Bottom half
  G.drawImage(img, sx, (d.row+1)*32, 32, 32, Math.round(dx), Math.round(dy+dh), dw, dh);
  return true;
}

// Draw a region from INT sheet
function r32(k,sx,sy,sw,sh,dx,dy,dw,dh){
  const img=IMG[k];
  if(!img||!img.complete||!img.naturalWidth)return false;
  G.imageSmoothingEnabled=false;
  G.drawImage(img,sx,sy,sw,sh,Math.round(dx),Math.round(dy),dw,dh);
  return true;
}

// ═══ KALİTE & MÜŞTERİ SİSTEMİ ═══
function getRestaurantScore() {
  // 0-100 arası restoran skoru
  let score = 50;

  // Temizlikçi etkisi
  const janitor = workers.find(w => w.role === 'janitor');
  if (!janitor) score -= 20;
  else score += janitor.sk * 5;

  // Aşçı kalitesi
  const chef = workers.find(w => w.role === 'chef');
  if (!chef) score -= 30;
  else score += chef.sk * 8;

  // Garson kalitesi
  const waiter = workers.find(w => w.role === 'waiter');
  if (waiter) score += waiter.sk * 4;

  // Mutluluk etkisi
  score += (happy - 50) * 0.3;

  // Dekor etkisi
  score += decoB * 3;

  // Bahçe etkisi
  score += Math.min(15, extPop * 1.5);

  return Math.max(0, Math.min(100, score));
}

function getCustSpawnRate() {
  if (!restType) return 6000;
  const base = REST_TYPES[restType].custRate;
  const score = getRestaurantScore();
  const scoreMult = 0.5 + (score / 100) * 1.0;
  const rushMult = getRushMultiplier();
  return Math.round(base / scoreMult / rushMult);
}

// Depo: {key: [{qty, expiresDay, location:'shelf'|'fridge'}]}
const warehouse = {};
Object.keys(ING).forEach(k => warehouse[k] = []);

// Depo kapasitesi kontrolü
function getStorageUsed(location) {
  let total = 0;
  Object.values(warehouse).forEach(batches => {
    batches.filter(b => b.location === location).forEach(b => total += b.qty);
  });
  return total;
}

function getStorageCap(location) {
  return location === 'fridge' ? fridgeCap : shelfCap;
}

// Malzeme satın al
function buyIngredient(key, qty, location) {
  const v = ING[key];
  if (!v) return false;
  const multi = restType ? REST_TYPES[restType].ingCostMulti : 1;
  const cost = Math.round(v.c * qty * multi);
  if (coins < cost) { notify('YETERSİZ ALTIN!'); return false; }
  // Kapasite kontrolü
  const cap = getStorageCap(location);
  const used = getStorageUsed(location);
  if (used + qty > cap) {
    notify((location === 'fridge' ? '❄️ Buzluk' : '📦 Raf') + ' dolu! (' + used + '/' + cap + ')');
    return false;
  }
  // Buzluğa konulamaz kontrolü
  if (location === 'fridge' && !v.fridge) {
    notify(v.e + ' ' + v.n + ' buzluğa konulamaz!');
    return false;
  }
  coins -= cost;
  logF('e', v.e + ' ' + v.n + ' ×' + qty, cost);
  const shelfDays = location === 'fridge' ? v.days * FRIDGE_MULTI : v.days;
  warehouse[key].push({ qty, expiresDay: dayNum + shelfDays, location });
  recalcIngQty(key);
  hudU();
  return true;
}

// Malzeme kullan (FIFO - en eski batch)
function useIngredient(key, qty = 1) {
  let rem = qty;
  const batches = warehouse[key].sort((a, b) => a.expiresDay - b.expiresDay);
  for (const b of batches) {
    if (rem <= 0) break;
    const take = Math.min(b.qty, rem);
    b.qty -= take; rem -= take;
  }
  warehouse[key] = warehouse[key].filter(b => b.qty > 0);
  recalcIngQty(key);
}

function recalcIngQty(key) {
  ING[key].q = warehouse[key]
    .filter(b => b.expiresDay >= dayNum)
    .reduce((s, b) => s + b.qty, 0);
}

function recalcAllIng() { Object.keys(ING).forEach(recalcIngQty); }

// Gün sonu bozulanlar
function spoilIngredients() {
  const spoiled = [];
  Object.keys(ING).forEach(key => {
    warehouse[key].forEach(b => {
      if (b.expiresDay < dayNum) {
        spoiled.push({ e: ING[key].e, n: ING[key].n, qty: b.qty, loc: b.location });
      }
    });
    warehouse[key] = warehouse[key].filter(b => b.expiresDay >= dayNum);
    recalcIngQty(key);
  });
  return spoiled;
}

// Yakında bozulacaklar
function getExpiringSoon(daysAhead = 1) {
  const warn = [];
  Object.keys(ING).forEach(key => {
    warehouse[key].forEach(b => {
      const left = b.expiresDay - dayNum;
      if (left <= daysAhead && b.qty > 0) {
        warn.push({ key, e: ING[key].e, n: ING[key].n, qty: b.qty, daysLeft: left, loc: b.location });
      }
    });
  });
  return warn;
}

// Depo özeti (UI için)
function getWarehouseSummary(key) {
  const batches = warehouse[key] || [];
  const shelf = batches.filter(b => b.location === 'shelf');
  const fridge = batches.filter(b => b.location === 'fridge');
  const shelfQty = shelf.reduce((s,b)=>s+b.qty,0);
  const fridgeQty = fridge.reduce((s,b)=>s+b.qty,0);
  const nextExpiry = batches.length > 0 ? Math.min(...batches.map(b=>b.expiresDay)) : null;
  return { shelfQty, fridgeQty, total: shelfQty+fridgeQty, nextExpiry, daysLeft: nextExpiry ? nextExpiry - dayNum : null };
}

let prepQueue = []; // aktif hazırlık işlemleri {key, startTime, endTime, chef}

function startPrepClick(el) { startPrep(el.dataset.key); }
function startPrep(key) {
  const pr = PREP_RECIPES[key];
  if (!pr) return;
  // Chef müsait mi?
  const chef = workers.find(w => w.role === 'chef' && w.status === 'idle');
  if (!chef) { notify('Müsait şef yok!'); return; }
  // Malzemeler var mı?
  for (const [ing, qty] of Object.entries(pr.from)) {
    if (!ING[ing] || ING[ing].q < qty) { notify(ING[ing]?.n + ' yok!'); return; }
  }
  // Malzemeleri kullan
  for (const [ing, qty] of Object.entries(pr.from)) useIngredient(ing, qty);
  // Kuyruğa ekle
  chef.status = 'busy'; buildWB();
  const endTime = Date.now() + pr.time;
  prepQueue.push({ key, endTime, chef });
  notify(pr.e + ' ' + pr.n + ' hazırlanıyor... (' + (pr.time/1000) + 'sn)');
  // Tamamlandığında
  setTimeout(() => {
    // Depoya ekle (shelf veya fridge'e - otomatik)
    const loc = ING[key].fridge ? 'fridge' : 'shelf';
    const cap = getStorageCap(loc);
    const used = getStorageUsed(loc);
    const canStore = Math.min(pr.yields, cap - used);
    if (canStore > 0) {
      warehouse[key].push({ qty: canStore, expiresDay: dayNum + ING[key].days, location: loc });
      recalcIngQty(key);
    }
    chef.status = 'idle';
    prepQueue = prepQueue.filter(p => p.key !== key || p.endTime !== endTime);
    buildWB();
    notify(pr.e + ' ' + pr.n + ' hazır! +' + canStore + ' adet');
    hudU();
  }, pr.time);
}

// Her gün için puanlar: [{day, stars, reason}]
let ratingHistory = [];
const RATING_WINDOW = 20; // son 20 günün puanları

function calcServiceRating(rec, cookDuration, waitedMs) {
  let stars = 3.0; // başlangıç

  // Yemek kalitesi (tarif seviyesine göre)
  stars += (rec.lv - 1) * 0.15;

  // Servis hızı bonusu/cezası
  // Bekleme süresi: siparişten servise kadar
  const totalMs = cookDuration + waitedMs;
  const restCustRate = restType ? REST_TYPES[restType].custRate : 5500;
  if(totalMs < restCustRate * 0.5) stars += 0.5;      // çok hızlı
  else if(totalMs < restCustRate) stars += 0.2;         // hızlı
  else if(totalMs > restCustRate * 2) stars -= 0.5;     // yavaş
  else if(totalMs > restCustRate * 3) stars -= 1.0;     // çok yavaş

  // Mutluluk etkisi
  const h = Math.max(0, Math.min(100, happy + extHap));
  stars += (h - 50) / 100; // -0.5 ile +0.5 arası

  // Temizlik etkisi
  const janitor = workers.find(w => w.role === 'janitor');
  if(!janitor) stars -= 0.5;
  else stars += (janitor.sk - 2) * 0.1;

  // Dekor etkisi
  stars += Math.min(0.5, decoB * 0.1);

  // Fine dining'de beklenti daha yüksek
  if(restType === 'finedining') stars -= 0.3;
  if(restType === 'fastfood') stars += 0.2; // beklenti düşük

  // Sınırla
  stars = Math.max(1, Math.min(5, stars));
  return Math.round(stars * 2) / 2; // 0.5'in katlarına yuvarla
}

function addRating(stars, reason) {
  ratingHistory.push({ day: dayNum, stars, reason });
  // 20 günden eskiyi sil
  ratingHistory = ratingHistory.filter(r => r.day >= dayNum - RATING_WINDOW);
}

function getAverageRating() {
  if(ratingHistory.length === 0) return null;
  const sum = ratingHistory.reduce((s, r) => s + r.stars, 0);
  return Math.round((sum / ratingHistory.length) * 10) / 10;
}

function getTodayRating() {
  const today = ratingHistory.filter(r => r.day === dayNum);
  if(today.length === 0) return null;
  const sum = today.reduce((s,r) => s + r.stars, 0);
  return Math.round((sum / today.length) * 10) / 10;
}

function starsHTML(rating, size) {
  if(rating === null) return '<span style="color:#555;font-size:'+size+'px">—</span>';
  const full = Math.floor(rating);
  const half = (rating % 1) >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  const s = size || 12;
  return '<span style="font-size:'+s+'px;letter-spacing:1px">'
    + '⭐'.repeat(full)
    + (half ? '✨' : '')
    + '☆'.repeat(empty)
    + '</span><span style="font-size:'+(s-2)+'px;color:#f5c842;margin-left:3px">'+rating+'</span>';
}

function cleanOldRatings() {
  const before = ratingHistory.length;
  ratingHistory = ratingHistory.filter(r => r.day >= dayNum - RATING_WINDOW);
  const removed = before - ratingHistory.length;
  if(removed > 0) console.log('Cleaned '+removed+' old ratings');
}

/* ══ RUSH HOUR SİSTEMİ ══ */
// Oyun günü: 120 saniye = 1 gün
// Haftanın günleri: 1=Pazartesi ... 5=Cuma ... 7=Pazar
// Cuma akşamı (gün 5 mod 7), Cumartesi (6), Pazar (7) rush hour

function getWeekDay() {
  return ((dayNum - 1) % 7) + 1; // 1-7 arası
}

function isRushHour() {
  const wd = getWeekDay();
  return wd === 5 || wd === 6 || wd === 7; // Cuma, Cmt, Pzr
}

const WEEKDAY_NAMES = {
  1: 'Pazartesi', 2: 'Salı', 3: 'Çarşamba',
  4: 'Perşembe', 5: 'Cuma 🔥', 6: 'Cumartesi 🔥', 7: 'Pazar 🔥'
};

function getRushMultiplier() {
  if (!isRushHour()) return 1.0;
  const wd = getWeekDay();
  if (wd === 5) return 1.5;  // Cuma: %50 daha fazla müşteri
  if (wd === 6) return 2.0;  // Cumartesi: 2x müşteri
  if (wd === 7) return 1.8;  // Pazar: 1.8x müşteri
  return 1.0;
}

function getRushPriceBonus() {
  if (!isRushHour()) return 1.0;
  const wd = getWeekDay();
  if (wd === 5) return 1.1;  // Cuma: %10 fiyat artışı
  if (wd === 6) return 1.2;  // Cumartesi: %20
  if (wd === 7) return 1.15; // Pazar: %15
  return 1.0;
}

// Rush hour başlangıç bildirimi
let lastRushNotified = -1;
function checkRushHour() {
  if (isRushHour() && lastRushNotified !== dayNum) {
    lastRushNotified = dayNum;
    const wd = getWeekDay();
    const msgs = {
      5: '🔥 CUMA AKŞAMI! Müşteriler geliyor... Fiyatlar +%10!',
      6: '🔥🔥 CUMARTESİ RUSH! 2x müşteri, fiyatlar +%20!',
      7: '🔥 PAZAR YOĞUNLUĞU! 1.8x müşteri, fiyatlar +%15!',
    };
    setTimeout(() => {
      notify(msgs[wd] || '🔥 RUSH HOUR!');
      // Rush hour'da ekstra müşteri spawn
      spawnCust(); spawnCust();
    }, 500);
  }
}

/* ══ LAYOUT ══ */
function getLay(){
  const gh=H-HH-BH;
  const S=Math.max(2,Math.floor(Math.min(W*.82/160,gh*.85/110)));
  const RW=Math.round(W*.88),RH=Math.round(gh*.9);
  const RX=Math.round((W-RW)/2),RY=HH+Math.round((gh-RH)/2);
  const KH=Math.round(RH*.22);
  const FY=RY+KH,FH=RH-KH;
  return {S,RW,RH,RX,RY,KH,FY,FH};
}
/* ══ GRID YERLEŞİM SİSTEMİ (Restaurant City tarzı) ══ */
const GRID_COLS=5, GRID_ROWS=4;

function gridCell(){
  const {S,RX,RW,FY,FH}=getLay();
  const cw=(RW-S*4)/GRID_COLS;
  const ch=(FH-S*5)/GRID_ROWS;
  return {cw,ch,ox:RX+S*2,oy:FY+S*2.5};
}

function cellTaken(c,r,skipTable,skipDeco){
  if(tables.some((t,j)=>j!==skipTable&&j<tableCount&&t.gc===c&&t.gr===r))return true;
  if(wallD.some((d,j)=>j!==skipDeco&&d.gc!==undefined&&d.gc===c&&d.gr===r))return true;
  return false;
}
function findFreeCell(skipIdx){
  for(let r=0;r<GRID_ROWS;r++)for(let c=0;c<GRID_COLS;c++){
    if(!cellTaken(c,r,skipIdx,-1)) return {c,r};
  }
  return {c:0,r:0};
}

function layoutTables(){
  const {cw,ch,ox,oy}=gridCell();
  tables.forEach((t,i)=>{
    if(i >= tableCount){ t.w=0; t.h=0; return; }
    // Grid pozisyonu yoksa ilk boş hücreye yerleştir
    if(t.gc===undefined||t.gc===null){
      const cell=findFreeCell(i); t.gc=cell.c; t.gr=cell.r;
    }
    // Çakışma kontrolü (önceki indexlerle)
    const clash=tables.some((o,j)=>j<i&&j<tableCount&&o.gc===t.gc&&o.gr===t.gr);
    if(clash){const cell=findFreeCell(i);t.gc=cell.c;t.gr=cell.r;}
    const TW=cw*0.78, TH=Math.min(ch*0.48, TW*0.6);
    t.x=ox+t.gc*cw+(cw-TW)/2;
    t.y=oy+t.gr*ch+(ch-TH)/2+ch*0.05;
    t.w=TW; t.h=TH;
  });
}

  for(let y=RY+S*8;y<RY+RH;y+=S*6){G.beginPath();G.moveTo(RX,y);G.lineTo(RX+RW,y);G.stroke();}
  G.fillStyle='rgba(0,0,0,.07)';G.fillRect(RX,RY,S*3,RH);

  G.fillStyle='#981018';G.fillRect(RX-S,RY-S*5,RW+S*2,S*5.5);
  G.fillStyle='#c81828';G.fillRect(RX-S,RY-S*5,RW+S*2,S*1.5);
  G.fillStyle='rgba(0,0,0,.1)';
  for(let x=RX;x<RX+RW;x+=S*4)G.fillRect(x,RY-S*5,S*.4,S*5.5);
  G.strokeStyle='#600810';G.lineWidth=S*.4;G.strokeRect(RX-S,RY-S*5,RW+S*2,S*5.5);
  // Chimney
  G.fillStyle='#887030';G.fillRect(RX+RW*.22,RY-S*8,S*4,S*4);
  G.fillStyle='#686020';G.fillRect(RX+RW*.22-S*.5,RY-S*9,S*5,S*1.2);

  // Neon signs
  const nf=tick%100<88,nc=nf?'#e890f8':'#a030c0';

  G.beginPath();G.roundRect(RX+RW*.26,RY+S*.8,RW*.48,S*3.8,S*.3);G.fill();
  G.strokeStyle=nc;G.lineWidth=S*.35;

  G.fillStyle=nc;G.shadowColor=nc;G.shadowBlur=S*2;

  G.strokeStyle=hc;G.lineWidth=S*.28;G.strokeRect(RX+RW-S*6.5,RY+S*2,S*6,S*7);
  G.fillStyle=hc;G.shadowColor=hc;G.shadowBlur=S;

  G.fillText('HOT',RX+RW-S*3.5,RY+S*4.2);G.fillText('CITY',RX+RW-S*3.5,RY+S*6.2);G.shadowBlur=0;

  // Windows
  [[RX+RW*.12,RY+S*5,'🌸'],[RX+RW*.26,RY+S*5,'🪴'],[RX+RW*.56,RY+S*5,'🌺'],[RX+RW*.70,RY+S*5,'🌷']].forEach(([wx,wy,pl])=>{

    G.fillStyle='#a08030';G.fillRect(wx,wy+wh,ww,S*.6);
    G.imageSmoothingEnabled=true;
    G.font=`${S*2.2}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText(pl,wx+ww/2,wy+wh+S*1.6);
    G.imageSmoothingEnabled=false;
  });

  // ── MUTFAK (tamamen vektörel) ──
  // Mutfak zemini: koyu fayans
  {
    G.save();G.beginPath();G.rect(RX,RY,RW,KH);G.clip();

    const kd=S*3.4;
    for(let iy=-1;iy*kd<KH+kd*2;iy++){

        G.closePath();G.fill();
        G.strokeStyle='rgba(15,50,65,0.3)';G.lineWidth=1;G.stroke();

    }
    G.fillStyle='rgba(255,255,255,0.06)';G.fillRect(RX,RY,RW,KH*0.35);
    G.restore();
  }

  // ── DUVAR KAĞIDI (arka duvar, RC tarzı çizgili) ──
  {
    const wpH=S*2.6;
    G.save();G.beginPath();G.rect(RX,RY,RW,wpH);G.clip();
    // Üst: krem duvar
    G.fillStyle='#f2ead6';G.fillRect(RX,RY,RW,wpH*0.55);
    G.fillStyle='rgba(255,255,255,0.3)';G.fillRect(RX,RY,RW,S*0.4);

    const wg4=G.createLinearGradient(0,RY+wpH*0.55,0,RY+wpH);
    wg4.addColorStop(0,'#9a6b36');wg4.addColorStop(1,'#7c5226');
    G.fillStyle=wg4;G.fillRect(RX,RY+wpH*0.55,RW,wpH*0.45);
    G.strokeStyle='rgba(70,45,18,0.5)';G.lineWidth=1;

    G.fillStyle='#6a4518';G.fillRect(RX,RY+wpH*0.55-S*0.15,RW,S*0.3);

  }

  // ── DUVAR DEKORLARI ──
  {

        // Buhar
        G.fillStyle='rgba(255,255,255,'+(0.25+Math.sin(tick*0.2+bi)*0.15)+')';
        G.beginPath();G.arc(bx+Math.sin(tick*0.1+bi)*S*0.5, by-S*2-((tick+bi*20)%30)*0.1*S, S*0.5,0,Math.PI*2);G.fill();
      } else {
        G.fillStyle='#1a1c22';
        G.beginPath();G.arc(bx,by,burnerR*0.6,0,Math.PI*2);G.fill();
      }
    });
    // Fırın kapağı
    G.fillStyle='#35708e';
    G.beginPath();G.roundRect(ox+S*0.8,oy+oh*0.58,ow-S*1.6,oh*0.32,S*0.3);G.fill();
    G.strokeStyle='#28546c';G.lineWidth=S*0.25;G.stroke();
    // Kapak camı
    G.fillStyle='rgba(230,245,255,0.4)';
    G.beginPath();G.roundRect(ox+S*1.2,oy+oh*0.63,ow-S*2.4,oh*0.18,S*0.2);G.fill();
    // Kapak kolu
    G.fillStyle='#dceaf2';
    G.fillRect(ox+S*1.5,oy+oh*0.56,ow-S*3,S*0.35);
  }

  // ── TEZGAH (ocakların sağında uzun çalışma tezgahı) ──
  {
    const tx2=RX+S*3+stoveCount*S*10+S*1, ty2=sy+S*1.5;
    const tw2=Math.max(S*8, RX+RW-S*20-tx2), th2=S*5;
    if(tw2>S*5){
      // Gölge
      G.fillStyle='rgba(0,0,0,0.2)';
      G.beginPath();G.roundRect(tx2+S*0.3,ty2+S*0.3,tw2,th2,S*0.4);G.fill();
      // Mermer üst
      const mg=G.createLinearGradient(tx2,ty2,tx2,ty2+th2*0.4);
      mg.addColorStop(0,'#f0ede4');mg.addColorStop(1,'#d8d4c8');
      G.fillStyle=mg;
      G.beginPath();G.roundRect(tx2,ty2,tw2,th2*0.4,S*0.3);G.fill();
      // Mermer damarları
      G.strokeStyle='rgba(160,150,140,0.4)';G.lineWidth=S*0.15;
      for(let mi=0;mi<3;mi++){
        G.beginPath();
        G.moveTo(tx2+tw2*(0.15+mi*0.3),ty2);
        G.quadraticCurveTo(tx2+tw2*(0.2+mi*0.3),ty2+th2*0.2,tx2+tw2*(0.12+mi*0.32),ty2+th2*0.4);
        G.stroke();
      }
      // Ahşap alt dolap
      const wg2=G.createLinearGradient(tx2,ty2+th2*0.4,tx2,ty2+th2);
      wg2.addColorStop(0,'#a8783c');wg2.addColorStop(1,'#8a5e28');
      G.fillStyle=wg2;
      G.fillRect(tx2,ty2+th2*0.4,tw2,th2*0.6);
      G.strokeStyle='#6a4518';G.lineWidth=S*0.3;
      G.strokeRect(tx2,ty2+th2*0.4,tw2,th2*0.6);
      // Dolap kapıları
      const doorCount=Math.floor(tw2/(S*5));
      for(let di=0;di<doorCount;di++){
        const ddx=tx2+S*0.5+di*(tw2-S)/doorCount;
        G.strokeStyle='rgba(80,50,20,0.5)';G.lineWidth=S*0.2;
        G.strokeRect(ddx,ty2+th2*0.48,(tw2-S)/doorCount-S*0.4,th2*0.44);
        G.fillStyle='#5a3c18';
        G.beginPath();G.arc(ddx+(tw2-S)/doorCount-S*1,ty2+th2*0.7,S*0.25,0,Math.PI*2);G.fill();
      }
      // Tezgah üstü detaylar: kesme tahtası + bıçak
      G.imageSmoothingEnabled=true;
      G.font=`${S*1.8}px serif`;G.textAlign='center';G.textBaseline='middle';
      G.fillText('🔪',tx2+tw2*0.2,ty2+th2*0.18);
      G.fillText('🥗',tx2+tw2*0.5,ty2+th2*0.18);
      G.fillText('🧂',tx2+tw2*0.8,ty2+th2*0.18);
      G.imageSmoothingEnabled=false;
    }
  }

  // ── BUZDOLABI (sağ köşe, büyük çelik) ──
  {
    const fx=RX+RW-S*9, fy2=sy-S*0.5, fw=S*6, fh=S*9;
    // Gölge
    G.fillStyle='rgba(0,0,0,0.25)';
    G.beginPath();G.roundRect(fx+S*0.4,fy2+S*0.4,fw,fh,S*0.5);G.fill();
    // Gövde
    const fg2=G.createLinearGradient(fx,fy2,fx+fw,fy2);
    fg2.addColorStop(0,'#d4d8e0');fg2.addColorStop(0.5,'#b8bcc8');fg2.addColorStop(1,'#989ca8');
    G.fillStyle=fg2;
    G.beginPath();G.roundRect(fx,fy2,fw,fh,S*0.5);G.fill();
    G.strokeStyle='#787c88';G.lineWidth=S*0.35;
    G.beginPath();G.roundRect(fx,fy2,fw,fh,S*0.5);G.stroke();
    // Kapı ayrımı (üst dondurucu, alt buzdolabı)
    G.strokeStyle='#888c98';G.lineWidth=S*0.3;
    G.beginPath();G.moveTo(fx,fy2+fh*0.35);G.lineTo(fx+fw,fy2+fh*0.35);G.stroke();
    // Kollar
    G.fillStyle='#5a5e6a';
    G.beginPath();G.roundRect(fx+fw-S*1.2,fy2+S*1,S*0.5,fh*0.2,S*0.2);G.fill();
    G.beginPath();G.roundRect(fx+fw-S*1.2,fy2+fh*0.42,S*0.5,fh*0.3,S*0.2);G.fill();
    // Parlaklık
    G.fillStyle='rgba(255,255,255,0.25)';
    G.beginPath();G.roundRect(fx+S*0.5,fy2+S*0.5,fw*0.25,fh-S,S*0.3);G.fill();
    // Buzluk etiketi
    G.imageSmoothingEnabled=true;
    G.font=`${S*1.6}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText('❄️',fx+fw/2,fy2+fh*0.17);
    G.imageSmoothingEnabled=false;
  }

  // ── SERVİS PASI (hazır tabakların beklediği banko) ──
  {
    const py2=RY+KH*0.60, ph2=S*3.2;
    const pxs=RX+S*3, pw2=RW-S*14;
    if(pw2>S*10){
      G.fillStyle='rgba(0,0,0,0.22)';
      G.beginPath();G.roundRect(pxs+S*0.3,py2+S*0.3,pw2,ph2,S*0.4);G.fill();
      const pg=G.createLinearGradient(0,py2,0,py2+ph2);
      pg.addColorStop(0,'#d8dde4');pg.addColorStop(0.45,'#aab2bd');pg.addColorStop(1,'#8a93a0');
      G.fillStyle=pg;
      G.beginPath();G.roundRect(pxs,py2,pw2,ph2,S*0.4);G.fill();
      G.strokeStyle='#5f6874';G.lineWidth=S*0.3;
      G.beginPath();G.roundRect(pxs,py2,pw2,ph2,S*0.4);G.stroke();
      G.fillStyle='rgba(255,255,255,0.3)';
      G.fillRect(pxs+S*0.3,py2+S*0.2,pw2-S*0.6,S*0.35);
      // Ayaklar
      G.fillStyle='#6a7280';
      G.fillRect(pxs+S*0.8,py2+ph2,S*0.8,S*1.1);
      G.fillRect(pxs+pw2-S*1.6,py2+ph2,S*0.8,S*1.1);
      // Üzerinde bekleyen tabaklar & kasalar
      G.imageSmoothingEnabled=true;
      G.font=`${S*1.9}px serif`;G.textAlign='center';G.textBaseline='middle';
      const its=['🍽️','🥘','🍲','📦','🧺','🍽️','🥡'];
      const cnt=Math.min(7,Math.floor(pw2/(S*6)));
      for(let ii=0;ii<cnt;ii++){
        G.fillText(its[ii%its.length], pxs+S*3+ii*S*6, py2+S*1.1);
      }
      G.imageSmoothingEnabled=false;
    }
  }

  // Mutfak etiketi
  G.fillStyle='rgba(40,40,48,0.75)';
  G.beginPath();G.roundRect(RX+S*1,RY+KH-S*2.8,S*9,S*2.2,S*0.4);G.fill();
  G.fillStyle='#e8d8a0';
  G.font=`bold ${S*1.1}px 'Press Start 2P',monospace`;G.textAlign='center';G.textBaseline='middle';
  G.fillText('MUTFAK',RX+S*5.5,RY+KH-S*1.7);

  // Menu slots
  menu.forEach((ri,idx)=>{
    const r=RCP[ri],mx=RX+S*35+idx*S*13,my=sy;
    G.fillStyle='rgba(16,8,2,.94)';G.beginPath();G.roundRect(mx,my,S*11,S*10,S*.3);G.fill();
    G.strokeStyle='rgba(90,50,15,.8)';G.lineWidth=S*.25;G.stroke();
    G.imageSmoothingEnabled=true;
    G.font=`${S*4.5}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText(r.e,mx+S*5.5,my+S*5);
    G.imageSmoothingEnabled=false;
    G.fillStyle='#b89038';G.font=`bold ${S*1.1}px 'Press Start 2P',monospace`;
    G.fillText('LV'+r.lv,mx+S*5.5,my+S*8.5);
    G.fillStyle='rgba(0,0,0,.35)';G.fillRect(mx+S,my+S*9.3,S*9,S*1.5);
    G.fillStyle='#d8a020';G.fillRect(mx+S,my+S*9.3,S*9*(r.xp/r.mx),S*1.5);
  });

  // Brick divider
  const divY=RY+KH;
  for(let i=0;i*S*6<RW;i++){
    G.fillStyle=i%2===0?'#6a4828':'#4a2810';
    G.fillRect(RX+i*S*6,divY,S*5.5,S*2.8);
    G.strokeStyle='rgba(0,0,0,.18)';G.lineWidth=S*.2;G.strokeRect(RX+i*S*6,divY,S*5.5,S*2.8);
  }
  G.fillStyle='#302010';G.fillRect(RX,divY,RW,S*.35);G.fillRect(RX,divY+S*2.8,RW,S*.35);
  G.fillStyle='#e0d888';G.beginPath();G.roundRect(RX+RW/2-S*8,divY-S*.4,S*16,S*3.8,S*.3);G.fill();
  G.strokeStyle='#a08020';G.lineWidth=S*.35;G.stroke();
  G.fillStyle='#484018';G.font=`bold ${S*1.0}px 'Press Start 2P',monospace`;
  G.textAlign='center';G.textBaseline='middle';
  G.fillText('SERViS PENCERESi',RX+RW/2,divY+S*1.5);

  // ── ZEMİN: sıcak parke + ışık havuzları ──
  {
    // RC tarzı BAKLAVA desenli zemin (krem + tarçın)
    G.save();G.beginPath();G.rect(RX,FY,RW,FH);G.clip();
    G.fillStyle='#e4cd9d';G.fillRect(RX,FY,RW,FH);
    const fd=S*3.7;
    for(let iy=-1;iy*fd<FH+fd*2;iy++){
      const cy0=FY+iy*fd, xoff=(iy%2===0)?0:fd;
      for(let ix=-1;ix*fd*2<RW+fd*2;ix++){
        const cx0=RX+ix*fd*2+xoff;
        G.fillStyle=((ix+iy)%2===0)?'#efdaab':'#d9b984';
        G.beginPath();
        G.moveTo(cx0,cy0-fd);G.lineTo(cx0+fd,cy0);G.lineTo(cx0,cy0+fd);G.lineTo(cx0-fd,cy0);
        G.closePath();G.fill();
        G.strokeStyle='rgba(120,85,45,0.18)';G.lineWidth=1;G.stroke();
      }
    }
    G.restore();

    // ── TAVAN LAMBALARINDAN IŞIK HAVUZLARI ──
    // 3 sarkıt lamba, her birinin altında sıcak ışık dairesi
    const lampCount=3;
    for(let li=0;li<lampCount;li++){
      const lx=RX+RW*(0.2+li*0.3);
      const lyFloor=FY+FH*0.35;
      // Işık havuzu (zeminde)
      const pool=G.createRadialGradient(lx,lyFloor,0,lx,lyFloor,S*16);
      pool.addColorStop(0,'rgba(255,235,170,0.22)');
      pool.addColorStop(0.6,'rgba(255,225,150,0.08)');
      pool.addColorStop(1,'rgba(255,220,140,0)');
      G.fillStyle=pool;
      G.beginPath();G.ellipse(lx,lyFloor,S*16,S*8,0,0,Math.PI*2);G.fill();
    }

    // Vinyet: kenarlar hafif kararır (sıcaklık hissi)
    const vg=G.createRadialGradient(RX+RW/2,FY+FH/2,Math.min(RW,FH)*0.35,RX+RW/2,FY+FH/2,Math.max(RW,FH)*0.7);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    vg.addColorStop(1,'rgba(40,20,5,0.18)');
    G.fillStyle=vg;
    G.fillRect(RX,FY,RW,FH);

    // Süpürgelik (duvar-zemin birleşimi)
    G.fillStyle='#8a6838';
    G.fillRect(RX,FY,RW,S*0.8);
    G.fillStyle='rgba(255,255,255,0.12)';
    G.fillRect(RX,FY,RW,S*0.25);

    G.strokeStyle='rgba(0,0,0,.3)';G.lineWidth=S*.4;G.strokeRect(RX,FY,RW,FH);
  }

  // ── GİRİŞ YOLLUĞU (kapıdan içeri) ──
  {
    const rw2=S*7, rh2=S*13;
    const rx2=RX+RW/2-rw2/2, ry2=FY+FH-rh2-S*0.4;
    G.fillStyle='rgba(0,0,0,0.10)';
    G.beginPath();G.roundRect(rx2+S*0.25,ry2+S*0.3,rw2,rh2,S*0.8);G.fill();
    const rg2=G.createLinearGradient(rx2,0,rx2+rw2,0);
    rg2.addColorStop(0,'#8c2f3d');rg2.addColorStop(0.5,'#a83848');rg2.addColorStop(1,'#8c2f3d');
    G.fillStyle=rg2;
    G.beginPath();G.roundRect(rx2,ry2,rw2,rh2,S*0.8);G.fill();
    G.strokeStyle='#5e1f2a';G.lineWidth=S*0.3;
    G.beginPath();G.roundRect(rx2,ry2,rw2,rh2,S*0.8);G.stroke();
    G.strokeStyle='rgba(240,210,150,0.7)';G.lineWidth=S*0.22;
    G.beginPath();G.roundRect(rx2+S*0.7,ry2+S*0.7,rw2-S*1.4,rh2-S*1.4,S*0.5);G.stroke();
    // Püsküller
    G.fillStyle='rgba(240,210,150,0.7)';
    for(let fx2=rx2+S*0.8; fx2<rx2+rw2-S*0.4; fx2+=S*0.9){
      G.fillRect(fx2,ry2-S*0.5,S*0.3,S*0.5);
      G.fillRect(fx2,ry2+rh2,S*0.3,S*0.5);
    }
  }

  // ── SARKIT LAMBALAR (tavandan) ──
  {
    for(let li=0;li<3;li++){
      const lx=RX+RW*(0.2+li*0.3);
      const cordTop=RY+KH+S*3;  // brick divider altından başlar
      const lampY=FY+S*2.5;
      // Kablo
      G.strokeStyle='#2a2a30';G.lineWidth=S*0.25;
      G.beginPath();G.moveTo(lx,cordTop);G.lineTo(lx,lampY-S*1.5);G.stroke();
      // Abajur (konik)
      const lg2=G.createLinearGradient(lx-S*2,lampY-S*1.5,lx+S*2,lampY);
      lg2.addColorStop(0,'#3a6858');lg2.addColorStop(0.5,'#4a8068');lg2.addColorStop(1,'#2a5040');
      G.fillStyle=lg2;
      G.beginPath();
      G.moveTo(lx-S*2.2,lampY);
      G.lineTo(lx-S*0.7,lampY-S*1.6);
      G.lineTo(lx+S*0.7,lampY-S*1.6);
      G.lineTo(lx+S*2.2,lampY);
      G.closePath();G.fill();
      G.strokeStyle='#1e3a2e';G.lineWidth=S*0.2;G.stroke();
      // Ampul ışığı
      const bulbGlow=0.75+Math.sin(tick*0.05+li*2)*0.1;
      G.fillStyle='rgba(255,240,180,'+bulbGlow+')';
      G.beginPath();G.arc(lx,lampY+S*0.2,S*0.55,0,Math.PI*2);G.fill();
      G.shadowColor='#ffe8a0';G.shadowBlur=S*1.5;
      G.fillStyle='rgba(255,245,200,0.9)';
      G.beginPath();G.arc(lx,lampY+S*0.2,S*0.35,0,Math.PI*2);G.fill();
      G.shadowBlur=0;
    }
  }

  // Tables
  drawFloorDecos();
  if(editMode) drawEditGrid();
  tables.forEach((t,i)=>{
    if(editMode && i===dragIdx){
      // Sürüklenen masa parmağı/imleci takip eder
      const tx0=t.x, ty0=t.y;
      t.x=dragPX-t.w/2; t.y=dragPY-t.h/2;
      G.globalAlpha=0.85;
      drawTable(t,i);
      G.globalAlpha=1;
      t.x=tx0; t.y=ty0;
    } else {
      drawTable(t,i);
    }
  });
  // Sürüklenen dekor imleci takip eder
  if(editMode && dragKind==='deco' && dragIdx>=0 && wallD[dragIdx]){
    G.globalAlpha=0.85;
    drawDecoToken(wallD[dragIdx],dragPX,dragPY,getLay().S);
    G.globalAlpha=1;
  }

  // Door — RC tarzı çift kanatlı, yuvarlak pencereli
  {
    const dw=S*9, dh=S*11;
    const dx=RX+RW/2-dw/2, dy=FY+FH-dh;
    // Çerçeve
    G.fillStyle='#5a3a16';
    G.beginPath();G.roundRect(dx-S*0.6,dy-S*0.9,dw+S*1.2,dh+S*0.9,S*0.5);G.fill();
    // Kanatlar
    for(let k=0;k<2;k++){
      const kx=dx+k*dw/2;
      const kg=G.createLinearGradient(kx,dy,kx+dw/2,dy);
      kg.addColorStop(0,'#b06c24');kg.addColorStop(1,'#8e5518');
      G.fillStyle=kg;
      G.beginPath();G.roundRect(kx+S*0.15,dy,dw/2-S*0.3,dh,S*0.35);G.fill();
      G.strokeStyle='#4e3010';G.lineWidth=S*0.3;
      G.beginPath();G.roundRect(kx+S*0.15,dy,dw/2-S*0.3,dh,S*0.35);G.stroke();
      // Yuvarlak cam
      const wx=kx+dw/4, wy=dy+S*3;
      G.fillStyle='#bfe0ea';
      G.beginPath();G.arc(wx,wy,S*1.35,0,Math.PI*2);G.fill();
      G.strokeStyle='#4e3010';G.lineWidth=S*0.35;
      G.beginPath();G.arc(wx,wy,S*1.35,0,Math.PI*2);G.stroke();
      G.fillStyle='rgba(255,255,255,0.55)';
      G.beginPath();G.ellipse(wx-S*0.4,wy-S*0.4,S*0.5,S*0.3,-0.6,0,Math.PI*2);G.fill();
      // Tekmelik
      G.fillStyle='#6e4414';
      G.fillRect(kx+S*0.6,dy+dh-S*2.2,dw/2-S*1.2,S*1.5);
      // Kol
      G.fillStyle='#e8c020';
      G.beginPath();G.arc(kx+(k===0?dw/2-S*1.1:S*1.1),dy+dh*0.52,S*0.5,0,Math.PI*2);G.fill();
    }
    // Karşılama paspası
    G.fillStyle='#a83848';
    G.beginPath();G.roundRect(dx+S*0.8,dy+dh-S*0.2,dw-S*1.6,S*1.5,S*0.4);G.fill();
    G.strokeStyle='rgba(255,255,255,0.45)';G.lineWidth=S*0.18;
    G.beginPath();G.roundRect(dx+S*0.8,dy+dh-S*0.2,dw-S*1.6,S*1.5,S*0.4);G.stroke();
  }
  // ── BAR TEZGAHI (vektörel) ──
  {
    const bx3=RX+RW-S*13, by3=FY+FH-S*7, bw3=S*11, bh3=S*5;
    // Gölge
    G.fillStyle='rgba(0,0,0,0.2)';
    G.beginPath();G.roundRect(bx3+S*0.3,by3+S*0.3,bw3,bh3,S*0.5);G.fill();
    // Koyu ahşap bar üstü
    const bg3=G.createLinearGradient(bx3,by3,bx3,by3+bh3*0.35);
    bg3.addColorStop(0,'#6a4426');bg3.addColorStop(1,'#523218');
    G.fillStyle=bg3;
    G.beginPath();G.roundRect(bx3,by3,bw3,bh3*0.35,S*0.4);G.fill();
    // Bar üstü parlaklık (cilalı)
    G.fillStyle='rgba(255,255,255,0.15)';
    G.beginPath();G.roundRect(bx3+S*0.3,by3+S*0.2,bw3-S*0.6,bh3*0.12,S*0.3);G.fill();
    // Ön panel (lambri)
    const pg3=G.createLinearGradient(bx3,by3+bh3*0.35,bx3,by3+bh3);
    pg3.addColorStop(0,'#7a5430');pg3.addColorStop(1,'#5e3e1e');
    G.fillStyle=pg3;
    G.fillRect(bx3,by3+bh3*0.35,bw3,bh3*0.65);
    G.strokeStyle='#42280e';G.lineWidth=S*0.3;
    G.strokeRect(bx3,by3+bh3*0.35,bw3,bh3*0.65);
    // Lambri çizgileri
    G.strokeStyle='rgba(60,35,12,0.5)';G.lineWidth=S*0.2;
    for(let li=1;li<5;li++){
      G.beginPath();G.moveTo(bx3+bw3*li/5,by3+bh3*0.38);G.lineTo(bx3+bw3*li/5,by3+bh3*0.97);G.stroke();
    }
    // Bardak ve fincan
    G.imageSmoothingEnabled=true;
    G.font=`${S*2.4}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText('🍹',bx3+bw3*0.3,by3+S*0.2);
    G.fillText('☕',bx3+bw3*0.65,by3+S*0.2);
    G.imageSmoothingEnabled=false;
  }
  if(wallD.length){
    G.imageSmoothingEnabled=true;
    G.font=`${S*2}px serif`;G.textAlign='center';G.textBaseline='middle';
    wallD.slice(-5).forEach((d,i)=>G.fillText(d.e,RX+RW*.15+i*S*5,RY+KH*.45));
    G.imageSmoothingEnabled=false;
  }

  // ── CHARACTERS ──
  drawWorkers();
  drawWalkers();
  trashArr=trashArr.filter(t=>t.a>0.04);
  trashArr.forEach(t=>{
    G.globalAlpha=t.a;G.imageSmoothingEnabled=true;
    G.font=`${S*2.8}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText('🗑️',t.x,t.y+Math.sin(tick*.1+t.x)*S*.4);
    G.imageSmoothingEnabled=false;G.globalAlpha=1;
  });
  extObjs.forEach(o=>{
    G.imageSmoothingEnabled=true;
    G.font=`${S*4}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText(o.e,o.x,o.y+Math.sin(tick*.02+o.x)*S*.5);
    G.imageSmoothingEnabled=false;
  });
  // Rush Hour göstergesi
  if(isRushHour() && restType){
    const rush_pulse = 0.7 + Math.sin(tick*0.15)*0.3;
    G.globalAlpha = rush_pulse;
    G.fillStyle = '#ff6030';
    G.font = `bold ${S*1.2}px 'Press Start 2P',monospace`;
    G.textAlign = 'right';
    G.textBaseline = 'top';
    G.shadowColor = '#ff6030';
    G.shadowBlur = S*2;
    G.fillText('🔥 RUSH x'+getRushMultiplier(), W-8, HH+6);
    G.shadowBlur = 0;
    G.globalAlpha = 1;
  }

  floats=floats.filter(f=>f.life>0);
  floats.forEach(f=>{
    f.life--;f.y-=0.7;
    G.globalAlpha=f.life/f.ml;G.fillStyle=f.col;
    G.font=`bold ${S*1.5}px 'Press Start 2P',monospace`;
    G.textAlign='center';G.textBaseline='middle';
    G.shadowColor=f.col;G.shadowBlur=S*.8;
    G.fillText(f.msg,f.x,f.y);G.shadowBlur=0;G.globalAlpha=1;
  });

  requestAnimationFrame(draw);
}

/* ══ TABLE DRAW ══ */
function drawTable(t,i){
  if(!t.w)return;
  const {S}=getLay();
  const {x,y,w,h,state,meal,cust}=t;
  const sh=S*2.6;                 // çapraz shear (RC diyagonal his)
  const cx=x+w/2+sh/2, cy=y+h/2;  // görsel merkez

  const TC={
    empty:{top:'#E8C88A',top2:'#D4A860',side:'#9A7028',edge:'#7A5418',glow:null},
    wait: {top:'#F8E058',top2:'#E8C828',side:'#B89810',edge:'#988008',glow:'#F0C800'},
    cook: {top:'#5CD878',top2:'#38B858',side:'#208840',edge:'#106828',glow:'#30C050'},
    done: {top:'#F8B048',top2:'#E88820',side:'#B86810',edge:'#965010',glow:'#F09020'},
  };
  const c2=TC[state]||TC.empty;

  // Paralelkenar köşeleri (üst kenar sağa kaymış)
  const TLx=x+sh, TRx=x+w+sh, BLx=x, BRx=x+w;
  const TY=y, BY=y+h, TH3=S*2.1; // ön yüz kalınlığı

  // ── ZEMİN GÖLGESİ ──
  G.fillStyle='rgba(0,0,0,0.22)';
  G.beginPath();G.ellipse(cx, BY+S*1.2, w*0.55, S*1.7, 0, 0, Math.PI*2);G.fill();

  // ── SANDALYE ÇİZERLERİ ──
  function backChair(bx){ // masa arkasında, küçük
    G.fillStyle='#8a5e28';
    G.beginPath();G.roundRect(bx,TY-S*2.4,S*2.4,S*2.6,S*0.4);G.fill();
    G.strokeStyle='#5e3c14';G.lineWidth=S*0.22;
    G.beginPath();G.roundRect(bx,TY-S*2.4,S*2.4,S*2.6,S*0.4);G.stroke();
    G.fillStyle='rgba(255,255,255,0.12)';
    G.fillRect(bx+S*0.25,TY-S*2.15,S*1.9,S*0.7);
  }
  function frontChair(bx){ // masa önünde, yüksek sırtlık bize dönük
    G.fillStyle='rgba(0,0,0,0.15)';
    G.beginPath();G.ellipse(bx+S*1.3,BY+S*3.1,S*1.5,S*0.5,0,0,Math.PI*2);G.fill();
    const fg=G.createLinearGradient(bx,BY+S*0.2,bx,BY+S*3);
    fg.addColorStop(0,'#a8773a');fg.addColorStop(1,'#7e5424');
    G.fillStyle=fg;
    G.beginPath();G.roundRect(bx,BY+S*0.2,S*2.6,S*2.9,S*0.45);G.fill();
    G.strokeStyle='#5e3c14';G.lineWidth=S*0.24;
    G.beginPath();G.roundRect(bx,BY+S*0.2,S*2.6,S*2.9,S*0.45);G.stroke();
    // sırtlık çıtaları
    G.strokeStyle='rgba(70,45,15,0.5)';G.lineWidth=S*0.2;
    for(let li2=1;li2<3;li2++){
      G.beginPath();G.moveTo(bx+S*2.6*li2/3,BY+S*0.5);G.lineTo(bx+S*2.6*li2/3,BY+S*2.8);G.stroke();
    }
    G.fillStyle='rgba(255,255,255,0.12)';
    G.fillRect(bx+S*0.25,BY+S*0.45,S*2.1,S*0.6);
  }
  function leftChair(){ // müşterinin oturduğu (mevcut anchor korunur)
    const cx0=x-S*3.2, cy0=y+h*0.04, scW=S*2.7, scH=h*0.92;
    G.fillStyle='rgba(0,0,0,0.15)';
    G.beginPath();G.ellipse(cx0+scW/2,cy0+scH,scW*0.55,S*0.55,0,0,Math.PI*2);G.fill();
    const cg=G.createLinearGradient(cx0,cy0,cx0,cy0+scH);
    cg.addColorStop(0,'#a8773a');cg.addColorStop(1,'#7e5424');
    G.fillStyle=cg;
    G.beginPath();G.roundRect(cx0,cy0,scW,scH,S*0.5);G.fill();
    G.strokeStyle='#5e3c14';G.lineWidth=S*0.26;
    G.beginPath();G.roundRect(cx0,cy0,scW,scH,S*0.5);G.stroke();
    G.fillStyle='#8a5e28';
    G.beginPath();G.roundRect(cx0-S*0.2,cy0-S*2.3,S*0.85,scH+S*2.55,S*0.35);G.fill();
    G.strokeStyle='#5e3c14';G.lineWidth=S*0.18;
    G.beginPath();G.roundRect(cx0-S*0.2,cy0-S*2.3,S*0.85,scH+S*2.55,S*0.35);G.stroke();
  }

  // Arka sandalyeler (masadan önce çizilir → arkasında kalır)
  backChair(TLx+w*0.18);
  backChair(TLx+w*0.58);
  leftChair();

  // ── MASA: ÖN YÜZ (alt kenar boyunca) ──
  G.fillStyle=c2.side;
  G.beginPath();
  G.moveTo(BLx,BY);G.lineTo(BRx,BY);
  G.lineTo(BRx,BY+TH3);G.lineTo(BLx,BY+TH3);
  G.closePath();G.fill();
  G.strokeStyle=c2.edge;G.lineWidth=S*0.3;G.stroke();
  // Sol yan kapak (küçük üçgen derinlik)
  G.fillStyle=c2.edge;
  G.beginPath();
  G.moveTo(BLx,BY);G.lineTo(TLx,TY);
  G.lineTo(TLx,TY+TH3*0.5);G.lineTo(BLx,BY+TH3);
  G.closePath();G.fill();

  // ── MASA ÜSTÜ (paralelkenar, gradient) ──
  const tg=G.createLinearGradient(0,TY,0,BY);
  tg.addColorStop(0,c2.top);tg.addColorStop(1,c2.top2);
  G.fillStyle=tg;
  G.beginPath();
  G.moveTo(TLx,TY);G.lineTo(TRx,TY);G.lineTo(BRx,BY);G.lineTo(BLx,BY);
  G.closePath();G.fill();

  if(c2.glow){
    G.save();
    G.shadowColor=c2.glow;
    G.shadowBlur=S*(2.5+Math.sin(tick*0.12+i)*1.2);
    G.strokeStyle=c2.edge;G.lineWidth=S*0.55;
    G.beginPath();
    G.moveTo(TLx,TY);G.lineTo(TRx,TY);G.lineTo(BRx,BY);G.lineTo(BLx,BY);
    G.closePath();G.stroke();
    G.restore();
  } else {
    G.strokeStyle=c2.edge;G.lineWidth=S*0.45;
    G.beginPath();
    G.moveTo(TLx,TY);G.lineTo(TRx,TY);G.lineTo(BRx,BY);G.lineTo(BLx,BY);
    G.closePath();G.stroke();
  }

  // Üst parlaklık şeridi
  G.fillStyle='rgba(255,255,255,0.20)';
  G.beginPath();
  G.moveTo(TLx+S*0.6,TY+S*0.4);G.lineTo(TRx-S*0.6,TY+S*0.4);
  G.lineTo(TRx-S*0.6-sh*0.35,TY+h*0.34);G.lineTo(TLx+S*0.6-sh*0.35+sh*0.35,TY+h*0.34);
  G.closePath();G.fill();

  // ── MASA ÖRTÜSÜ (boş masada, paralelkenar) ──
  if(state==='empty'){
    const inX=S*1.0, inY=S*0.8;
    G.fillStyle='#a83848';
    G.beginPath();
    G.moveTo(TLx+inX,TY+inY);G.lineTo(TRx-inX,TY+inY);
    G.lineTo(BRx-inX,BY-inY);G.lineTo(BLx+inX,BY-inY);
    G.closePath();G.fill();
    G.strokeStyle='rgba(255,255,255,0.65)';G.lineWidth=S*0.22;
    G.setLineDash([S*0.55,S*0.4]);
    G.beginPath();
    G.moveTo(TLx+inX+S*0.35,TY+inY+S*0.3);G.lineTo(TRx-inX-S*0.35,TY+inY+S*0.3);
    G.lineTo(BRx-inX-S*0.35,BY-inY-S*0.3);G.lineTo(BLx+inX+S*0.35,BY-inY-S*0.3);
    G.closePath();G.stroke();
    G.setLineDash([]);
  }

  // ── İÇERİK ──
  G.imageSmoothingEnabled=true;
  G.textAlign='center';G.textBaseline='middle';

  if(state==='empty'){
    G.fillStyle='rgba(255,255,255,0.7)';
    G.beginPath();G.ellipse(cx, cy, S*1.8, S*1.35, 0, 0, Math.PI*2);G.fill();
    G.strokeStyle='rgba(0,0,0,0.12)';G.lineWidth=S*0.3;
    G.beginPath();G.ellipse(cx, cy, S*1.8, S*1.35, 0, 0, Math.PI*2);G.stroke();
    G.fillStyle='rgba(180,180,180,0.5)';
    G.font=`${S*1.6}px serif`;
    G.fillText('🍽️', cx, cy);
  } else if(state==='wait'){
    G.font=`${S*3}px serif`;
    G.fillText('💭', cx, cy-S*0.5);
  } else if(state==='cook'&&meal>=0){
    G.font=`${S*3.2}px serif`;
    G.fillText(RCP[menu[meal]]?.e||'🍳', cx, cy-S*0.3);
    const pct=Math.max(0,Math.min(1,(Date.now()-t.cs)/(t.ce-t.cs)));
    G.imageSmoothingEnabled=false;
    const barW=w-S*2, barX=x+S+sh*0.4, barY=BY-S*2.2;
    G.fillStyle='rgba(0,0,0,0.35)';
    G.beginPath();G.roundRect(barX,barY,barW,S*1.5,S*0.5);G.fill();
    const pbg=G.createLinearGradient(barX,0,barX+barW,0);
    pbg.addColorStop(0,'#40D060');pbg.addColorStop(1,'#80F090');
    G.fillStyle=pbg;
    G.beginPath();G.roundRect(barX,barY,barW*pct,S*1.5,S*0.5);G.fill();
    G.imageSmoothingEnabled=true;
  } else if(state==='done'){
    G.font=`${S*3.2}px serif`;
    G.fillText(meal>=0?RCP[menu[meal]]?.e||'✅':'✅', cx, cy-S*0.3);
    G.fillStyle='rgba(255,255,255,'+(0.3+Math.sin(tick*0.2)*0.15)+')';
    G.font=`${S*1.4}px serif`;
    G.fillText('♨️', cx, cy-S*2.5);
  }
  G.imageSmoothingEnabled=false;

  // Ön sandalyeler (masadan SONRA → RC'deki gibi önde dururlar)
  frontChair(BLx+w*0.16);
  frontChair(BLx+w*0.56);

  // ── DURUM ETİKETİ ──
  const lbls={wait:'TIKLA!',cook:'PİŞİYOR',done:'HAZIR!'};
  if(lbls[state]){
    const lblColor=state==='done'?'#40E060':state==='wait'?'#FFE040':'#FFFFFF';
    G.fillStyle='rgba(0,0,0,0.55)';
    const lblW=S*6.5;
    G.beginPath();G.roundRect(cx-lblW/2, BY-S*1.1, lblW, S*2, S*0.5);G.fill();
    G.fillStyle=lblColor;
    G.font=`bold ${S*1.0}px 'Press Start 2P',monospace`;
    G.textAlign='center';G.textBaseline='middle';
    G.fillText(lbls[state], cx, BY-S*0.1);
  }

  // ── SABIR GÖSTERGESİ ──
  if((state==='wait'&&t.waitStart)||(state==='done'&&t.doneStart)){
    const total = state==='wait'?11000:20000;
    const start = state==='wait'?t.waitStart:t.doneStart;
    const left = Math.max(0, 1-(Date.now()-start)/total);
    const pEmoji = left>0.55?'😊':left>0.25?'😐':'😡';
    const pCol = left>0.55?'#40d060':left>0.25?'#f0c030':'#e04040';
    const pbx=TLx+S*0.2, pby=TY-S*4.3, pbw=S*5.5, pbh=S*1.1;
    G.fillStyle='rgba(0,0,0,0.55)';
    G.beginPath();G.roundRect(pbx-S*0.3,pby-S*0.35,pbw+S*3.2,pbh+S*0.7,S*0.5);G.fill();
    G.fillStyle='rgba(255,255,255,0.15)';
    G.beginPath();G.roundRect(pbx+S*2.4,pby,pbw,pbh,S*0.4);G.fill();
    G.fillStyle=pCol;
    G.beginPath();G.roundRect(pbx+S*2.4,pby,Math.max(S*0.5,pbw*left),pbh,S*0.4);G.fill();
    G.imageSmoothingEnabled=true;
    G.font=`${S*1.9}px serif`;G.textAlign='center';G.textBaseline='middle';
    G.fillText(pEmoji,pbx+S*1.1,pby+pbh/2);
    G.imageSmoothingEnabled=false;
  }

  // ── KONUŞMA BALONU ──
  if(cust&&state!=='empty'){
    const bx2=TRx-S*4.5, by2=TY-S*6;
    G.fillStyle='rgba(0,0,0,0.15)';
    G.beginPath();G.roundRect(bx2+S*0.3, by2+S*0.3, S*5, S*3.4, S*0.6);G.fill();
    G.fillStyle='#fff';
    G.beginPath();G.roundRect(bx2, by2, S*5, S*3.4, S*0.6);G.fill();
    G.strokeStyle=c2.edge;G.lineWidth=S*0.35;
    G.beginPath();G.roundRect(bx2, by2, S*5, S*3.4, S*0.6);G.stroke();
    G.fillStyle='#fff';
    G.beginPath();
    G.moveTo(bx2+S*1.2, by2+S*3.4);
    G.lineTo(bx2+S*2.6, by2+S*3.4);
    G.lineTo(bx2+S*1.8, by2+S*4.6);
    G.closePath();G.fill();
    const bubbleEmoji=(state==='cook'||state==='done')&&meal>=0?(RCP[menu[meal]]?.e||cust):'❔';
    G.imageSmoothingEnabled=true;
    G.font=`${S*2.4}px serif`;
    G.textAlign='center';G.textBaseline='middle';
    G.fillText(bubbleEmoji, bx2+S*2.5, by2+S*1.7);
    G.imageSmoothingEnabled=false;
  }
}

/* ══ RC TARZI CHİBİ İNSAN ÇİZİMİ ══ */
function drawPerson(px, py, o){
  const S=o.S, bob=o.bob||0;
  const hr=S*2.15;              // RC: koca kafa!
  const bw=S*3.1, bh=S*2.5;     // ufak gövde
  // Ayak gölgesi
  G.fillStyle='rgba(0,0,0,0.25)';
  G.beginPath();G.ellipse(px,py+S*0.25,S*1.9,S*0.55,0,0,Math.PI*2);G.fill();
  const fy=py+bob;
  // Ayaklar
  G.fillStyle='#3a2a1a';
  G.beginPath();G.ellipse(px-S*0.8,fy-S*0.12,S*0.62,S*0.36,0,0,Math.PI*2);G.fill();
  G.beginPath();G.ellipse(px+S*0.8,fy-S*0.12,S*0.62,S*0.36,0,0,Math.PI*2);G.fill();
  // Gövde
  const by=fy-S*0.35-bh;
  const bg=G.createLinearGradient(px-bw/2,by,px+bw/2,by);
  bg.addColorStop(0,o.body);bg.addColorStop(1,o.body2||o.body);
  G.fillStyle=bg;
  G.beginPath();G.roundRect(px-bw/2,by,bw,bh+S*0.35,S*1.1);G.fill();
  G.strokeStyle='rgba(30,20,10,0.42)';G.lineWidth=S*0.24;
  G.beginPath();G.roundRect(px-bw/2,by,bw,bh+S*0.35,S*1.1);G.stroke();
  G.fillStyle='rgba(255,255,255,0.18)';
  G.beginPath();G.roundRect(px-bw/2+S*0.3,by+S*0.25,bw*0.38,bh*0.5,S*0.5);G.fill();
  // KAFA (büyük, RC oranı)
  const hy=by-hr*0.82;
  G.fillStyle=o.skin||'#ffd9b0';
  G.beginPath();G.arc(px,hy,hr,0,Math.PI*2);G.fill();
  G.strokeStyle='rgba(120,80,50,0.5)';G.lineWidth=S*0.22;
  G.beginPath();G.arc(px,hy,hr,0,Math.PI*2);G.stroke();
  // Saç (dolgun)
  if(o.hair){
    G.fillStyle=o.hair;
    G.beginPath();G.arc(px,hy,hr,Math.PI*0.92,Math.PI*2.08);G.fill();
    G.beginPath();G.ellipse(px,hy-hr*0.58,hr*0.9,hr*0.5,0,0,Math.PI*2);G.fill();
  }
  // Yüz (bakış yönü)
  const fo = o.face==='left'?-S*0.55:o.face==='right'?S*0.55:0;
  G.fillStyle='#2a2020';
  G.beginPath();G.arc(px-S*0.72+fo,hy+S*0.18,S*0.3,0,Math.PI*2);G.fill();
  G.beginPath();G.arc(px+S*0.72+fo,hy+S*0.18,S*0.3,0,Math.PI*2);G.fill();
  G.strokeStyle='#2a2020';G.lineWidth=S*0.2;
  G.beginPath();G.arc(px+fo,hy+S*0.78,S*0.6,0.15*Math.PI,0.85*Math.PI);G.stroke();
  G.fillStyle='rgba(240,120,110,0.4)';
  G.beginPath();G.arc(px-S*1.32+fo,hy+S*0.78,S*0.32,0,Math.PI*2);G.fill();
  G.beginPath();G.arc(px+S*1.32+fo,hy+S*0.78,S*0.32,0,Math.PI*2);G.fill();
  // Şef şapkası
  if(o.hat==='chef'){
    G.fillStyle='#f8f8f2';
    G.beginPath();G.roundRect(px-hr*0.82,hy-hr-S*1.0,hr*1.64,S*1.25,S*0.3);G.fill();
    G.beginPath();G.arc(px-hr*0.45,hy-hr-S*1.0,S*0.7,0,Math.PI*2);G.fill();
    G.beginPath();G.arc(px,hy-hr-S*1.3,S*0.85,0,Math.PI*2);G.fill();
    G.beginPath();G.arc(px+hr*0.45,hy-hr-S*1.0,S*0.7,0,Math.PI*2);G.fill();
    G.strokeStyle='rgba(150,150,150,0.45)';G.lineWidth=S*0.16;
    G.beginPath();G.roundRect(px-hr*0.82,hy-hr-S*1.0,hr*1.64,S*1.25,S*0.3);G.stroke();
  }
  return hy-hr-(o.hat==='chef'?S*2.2:S*0.15);
}

function drawWorkers(){
  G.globalAlpha=1; // ensure full opacity
  const {S,RX,FY,RW,FH}=getLay();

  // Ensure chars array is in sync
  while(chars.length<workers.length){
    chars.push({
      x: RX + RW*(0.15+chars.length*0.22),
      y: FY + FH*0.45,
      tx:0, ty:0, moving:false, frame:0, ph:Math.random()*6.28
    });
  }
  chars.length=workers.length;

  workers.forEach((w,i)=>{
    const c=chars[i];
    // Clamp position inside floor
    if(c.x<RX+S*3||c.x>RX+RW-S*3||c.y<FY+S*3||c.y>FY+FH-S*3){
      c.x=RX+RW*(0.15+i*0.22);
      c.y=FY+FH*0.45;
    }

    c.frame+=0.08;
    c.ph+=0.05;

    // Random wander
    if(Math.random()<0.004&&!c.moving){
      c.tx=RX+S*4+Math.random()*(RW-S*8);
      c.ty=FY+S*4+Math.random()*(FH-S*8);
      c.moving=true;
    }
    if(c.moving){
      const dx=c.tx-c.x, dy=c.ty-c.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<2) c.moving=false;
      else{ c.x+=dx/d*0.9; c.y+=dy/d*0.9; }
    }

    const px=Math.round(c.x);
    const py=Math.round(c.y);
    const bob=Math.sin(c.ph)*S*0.3;

    const OUTFIT={
      chef:['#f8f8f2','#e2e2da','chef'],
      waiter:['#4ec080','#2a8850',null],
      janitor:['#6a88e0','#3c58b8',null],
      bartender:['#d878c0','#a04890',null],
    };
    const of=OUTFIT[w.role]||['#c0c0c0','#909090',null];

  });
}

function drawWalkers(){
  walkers=walkers.filter(w=>w.alpha>0.04);
  const {S}=getLay();
  walkers.forEach(w=>{
    if(w.exiting){
      // Kapıya doğru yürüyor (servis sonrası veya gitti)
      const dx=w.tx-w.x, dy=w.ty-w.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<3){ w.alpha=Math.max(0,w.alpha-0.03); }
      else { w.x+=dx/d*1.5; w.y+=dy/d*1.5; }
    } else if(!w.seated){
      // Masaya doğru yürüyor
      const dx=w.tx-w.x, dy=w.ty-w.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<2){ w.seated=true; } // masaya oturdu, BEKLEMEDE kalır
      else { w.x+=dx/d*1.2; w.y+=dy/d*1.2; }
    }
    // seated ise hareketsiz masada bekler (alpha sabit kalır)
    const px=Math.round(w.x),py=Math.round(w.y);
    const walkBob=w.seated?0:Math.sin(tick*0.28+px*0.1)*S*0.32;
    G.globalAlpha=w.alpha;

    const CB=['#e06868','#5f9be0','#e8a848','#9a6fd0','#50b8a8','#d878b0','#8fb84a'];
    const CH=['#3a2a1a','#6a4a20','#141414','#8a3018','#c8a040','#5a5a5a'];
    const hc=(w.emoji&&w.emoji.codePointAt(0))||65;

    drawPerson(px,py,{S,bob:walkBob,
      body:CB[hc%7],body2:CB[(hc+3)%7],
      skin:'#ffd9b0',hair:CH[hc%6],
      face:w.seated?(w.sitFace||'right'):'down'});
    G.globalAlpha=1;
  });
  G.globalAlpha=1;
}

/* ══ GAME LOGIC ══ */
function onTable(i){
  const t=tables[i];if(!t)return;
  if(t.state==='empty')return;
  if(t.state==='wait'){
    const ch=workers.find(w=>w.role==='chef'&&w.status==='idle');
    if(!ch){notify('SEF YOK!');return;}
    if(!menu.length){notify('MENUDE YEMEK YOK!');return;}
    const ri=Math.floor(Math.random()*menu.length),rec=RCP[menu[ri]];
    for(const k of rec.i){if(!ING[k]||ING[k].q<=0){notify((ING[k]?.n||k)+' BITTI!');return;}}
    rec.i.forEach(k=>{ if(ING[k]) useIngredient(k,1); });
    const speedM = restType ? REST_TYPES[restType].cookSpeed : 1.0;
    const dur = Math.max(3000, Math.round((rec.t - rec.lv*150 - ch.sk*80) / speedM));
    t.state='cook';t.meal=ri;t.cs=Date.now();t.ce=Date.now()+dur;
    ch.status='busy';buildWB();
    const wa=workers.find(w=>w.role==='waiter'&&w.status==='idle');
    if(wa){wa.status='busy';buildWB();setTimeout(()=>{wa.status='idle';buildWB();},1200);}
    // Pişirme başlayınca bekleyiş timer'ını durdur
    if(leaves[i]){clearTimeout(leaves[i]);leaves[i]=null;}
    if(cooks[i])clearTimeout(cooks[i]);
    cooks[i]=setTimeout(()=>{
      t.state='done';t.doneStart=Date.now();ch.status='idle';buildWB();
      notify(rec.e+' '+rec.n+' HAZIR!');
      // Hazır yemeği servis et butonuna basılmazsa müşteri 20sn sonra gider
      leaves[i]=setTimeout(()=>{
        if(tables[i]&&tables[i].state==='done'){
          tables[i].state='empty';tables[i].meal=-1;tables[i].cust='';
          happy=Math.max(0,happy-15);
          sfx('angry');notify('😠 Servis yapılmadı! Müşteri gitti!');
          hudU();
          const lay5=getLay();
          const tw=walkers.find(w=>w.tableIdx===i&&!w.exiting);
          if(tw){tw.exiting=true;tw.seated=false;tw.tx=lay5.RX+lay5.RW/2;tw.ty=lay5.FY+lay5.FH-lay5.S*2;}
          seatFromQueue();
        }
      },20000);
    },dur);
  }else if(t.state==='cook'){notify('HENUZ HAZIR DEGIL...');
  }else if(t.state==='done'){
    const rec=RCP[menu[t.meal]];
    const serveTime = Date.now() - t.cs; // pişirme başlangıcından servise
    const priceM = (restType ? REST_TYPES[restType].priceMulti : 1) * getRushPriceBonus();
    // Optional malzeme bonusu (karamelize soğan vs)
    let optBonus = 0;
    if(rec.opt){
      for(const [optKey, bonus] of Object.entries(rec.opt)){
        if(ING[optKey]&&ING[optKey].q>0){ useIngredient(optKey,1); optBonus+=bonus; }
      }
    }
    const earn = Math.round((rec.p + Math.floor(rec.lv*1.5) + decoB + Math.floor(extPop/10) + (workers.find(w=>w.role==='bartender')?3:0) + optBonus) * priceM);
    addTaxableIncome(earn);
    sfx('coin');
    if(optBonus>0) notify('✨ Bonus: +'+optBonus+'G (özel malzeme)!');
    // Rating hesapla ve ekle
    const cookDur = t.ce - t.cs;
    const stars = calcServiceRating(rec, cookDur, 0);
    addRating(stars, rec.n);
    // Yıldız float göster
    const starsDisp = stars >= 4.5 ? '⭐⭐⭐⭐⭐' : stars >= 4 ? '⭐⭐⭐⭐' : stars >= 3 ? '⭐⭐⭐' : stars >= 2 ? '⭐⭐' : '⭐';
    floats.push({msg:starsDisp, x:t.x+t.w/2, y:t.y-getLay().S*3, col:'#f5c842', life:50, ml:50});
    if(stars>=4){floats.push({msg:'❤️',x:t.x+t.w*0.25,y:t.y-getLay().S*1.5,col:'#ff6080',life:55,ml:55});sfx('serve');}
    hudU();
    const gpE=2+Math.floor(rec.lv/3);
    coins+=earn;awardGP(gpE);happy=Math.min(100,happy+2);
    rec.xp+=5;if(rec.xp>=rec.mx&&rec.lv<10){rec.xp=0;rec.lv++;rec.mx=Math.round(rec.mx*1.5);sfx('unlock');floats.push({msg:'⬆️ LV '+(rec.lv),x:t.x+t.w/2,y:t.y-getLay().S*6,col:'#70f0a0',life:65,ml:65});notify(rec.e+' LV UP! LV'+rec.lv);}
    logF('i',rec.e+' '+rec.n,earn);
    if(leaves[i]){clearTimeout(leaves[i]);leaves[i]=null;}
    t.state='empty';t.meal=-1;t.cust='';hudU();buildWB();
    // Müşteri walker'ı kapıya yürüsün (mutlu ayrılış)
    const lay3 = getLay();
    const tw = walkers.find(w=>w.tableIdx===i && w.seated && !w.exiting);
    if(tw){
      tw.exiting=true;
      tw.tx=lay3.RX+lay3.RW/2;
      tw.ty=lay3.FY+lay3.FH-lay3.S*2;
    }
    seatFromQueue();
    const {S}=getLay();
    floats.push({msg:'+'+earn+'G',x:t.x+t.w/2,y:t.y,col:'#f5c842',life:60,ml:60});
    floats.push({msg:'+'+gpE+'GP',x:t.x+t.w/2,y:t.y-S*5,col:'#70c8f0',life:60,ml:60});
    if(Math.random()<.22)spawnTrash();
  }
}
/* ══ KAPI KUYRUĞU (RC tarzı) ══ */
let doorQueue=[]; // {emoji, joinTime, walker}
const QUEUE_MAX=3, QUEUE_PATIENCE=9000;

function queueSlotPos(idx){
  const {RX,RW,FY,FH,S}=getLay();
  return {x:RX+RW*0.5+S*(5.5+idx*5.5), y:FY+FH-S*2};
}

function joinQueue(){
  if(doorQueue.length>=QUEUE_MAX){happy=Math.max(0,happy-3);hudU();return;}
  const emojis=['👩','👨','🧑','👴','👵','🧔','👱','🧕'];
  const cust=emojis[Math.floor(Math.random()*emojis.length)];
  const {RX,FY,RW,FH,S}=getLay();
  const slot=queueSlotPos(doorQueue.length);
  const wk={emoji:cust,x:RX+RW/2,y:FY+FH-S*0.5,tx:slot.x,ty:slot.y,frame:0,alpha:1,seated:false,exiting:false,inQueue:true};
  walkers.push(wk);
  doorQueue.push({emoji:cust,joinTime:Date.now(),walker:wk});
}

function updateQueuePositions(){
  doorQueue.forEach((q,idx)=>{
    const slot=queueSlotPos(idx);
    if(q.walker){q.walker.tx=slot.x;q.walker.ty=slot.y;q.walker.seated=false;}
  });
}

function checkQueuePatience(){
  const now=Date.now();
  let changed=false;
  for(let qi=doorQueue.length-1;qi>=0;qi--){
    if(now-doorQueue[qi].joinTime>QUEUE_PATIENCE){
      const q=doorQueue.splice(qi,1)[0];
      if(q.walker){
        const L=getLay();
        q.walker.inQueue=false;q.walker.exiting=true;q.walker.seated=false;
        q.walker.tx=L.RX+L.RW/2;q.walker.ty=L.FY+L.FH+L.S*2;
      }
      happy=Math.max(0,happy-8);
      sfx('angry');notify('😤 Sıradaki müşteri bekleyemedi, gitti!');
      changed=true;
    }
  }
  if(changed){hudU();updateQueuePositions();}
}

function seatFromQueue(){
  if(!doorQueue.length)return;
  const empty=tables.map((t,idx)=>t.state==='empty'&&t.w>0?idx:-1).filter(x=>x>=0);
  if(!empty.length)return;
  const q=doorQueue.shift();
  const i=empty[0];
  tables[i].state='wait';tables[i].cust=q.emoji;tables[i].waitStart=Date.now();
  if(q.walker){
    q.walker.inQueue=false;q.walker.seated=false;q.walker.exiting=false;
    q.walker.tableIdx=i;
    const {S:S9}=getLay();
    q.walker.tx=tables[i].x-S9*1.9;
    q.walker.ty=tables[i].y+tables[i].h*1.05;
    q.walker.sitFace='right';
  }
  updateQueuePositions();
  notify('🚶 Sıradaki müşteri masaya oturdu!');
  // Bekleme zamanlayıcısı (spawnCust ile aynı)
  const cust=q.emoji;
  if(leaves[i])clearTimeout(leaves[i]);
  leaves[i]=setTimeout(()=>{
    if(tables[i]&&tables[i].state==='wait'){
      tables[i].state='empty';tables[i].cust='';
      happy=Math.max(0,happy-10);sfx('angry');notify(cust+' GITTI! (sipariş alınmadı)');hudU();
      const lay4=getLay();
      const tw=walkers.find(w=>w.tableIdx===i&&!w.exiting);
      if(tw){tw.exiting=true;tw.seated=false;tw.tx=lay4.RX+lay4.RW/2;tw.ty=lay4.FY+lay4.FH-lay4.S*2;}
      seatFromQueue();
    }
  },11000);
}

function spawnCust(){
  if(!restType) return; // restoran tipi seçilmeden müşteri gelmesin
  const empty=tables.map((t,i)=>t.state==='empty'?i:-1).filter(x=>x>=0);
  if(!empty.length){joinQueue();return;}
  if(!workers.some(w=>w.role==='waiter'||w.role==='bartender'))return;
  const i=empty[Math.floor(Math.random()*empty.length)];
  const emojis=['👩','👨','🧑','👴','👵','🧔','👱','🧕'];
  const cust=emojis[Math.floor(Math.random()*emojis.length)];
  tables[i].state='wait';tables[i].cust=cust;tables[i].waitStart=Date.now();
  const {RX,FY,RW,FH,S}=getLay();
  walkers.push({emoji:cust,tableIdx:i,x:RX+RW/2,y:FY+FH-S*3,tx:tables[i].x-S*1.9,ty:tables[i].y+tables[i].h*1.05,sitFace:'right',frame:0,alpha:1,seated:false,exiting:false});
  if(leaves[i])clearTimeout(leaves[i]);
  leaves[i]=setTimeout(()=>{
    if(tables[i]&&tables[i].state==='wait'){
      tables[i].state='empty';tables[i].cust='';
      happy=Math.max(0,happy-10);sfx('angry');notify(cust+' GITTI! (sipariş alınmadı)');hudU();
      // Walker'ı çıkışa yönlendir
      const lay4=getLay();
      const tw=walkers.find(w=>w.tableIdx===i&&!w.exiting);
      if(tw){tw.exiting=true;tw.seated=false;tw.tx=lay4.RX+lay4.RW/2;tw.ty=lay4.FY+lay4.FH-lay4.S*2;}
      seatFromQueue();
    }
  },11000);
}
function spawnTrash(){
  if(trashArr.filter(t=>t.a>.1).length>=3)return;
  const {RX,FY,RW,FH,S}=getLay();
  trashArr.push({x:RX+S*4+Math.random()*(RW-S*8),y:FY+S*3+Math.random()*(FH-S*6),a:1});
}

function drawDecoToken(d,px,py,S){

  const bg=G.createRadialGradient(px,py-S*0.4,S*0.4,px,py,S*2.5);
  bg.addColorStop(0,'#e8d8b8');bg.addColorStop(1,'#b09060');
  G.fillStyle=bg;
  G.beginPath();G.ellipse(px,py,S*2.3,S*1.0,0,0,Math.PI*2);G.fill();
  G.strokeStyle='rgba(90,60,30,0.4)';G.lineWidth=S*0.22;
  G.beginPath();G.ellipse(px,py,S*2.3,S*1.0,0,0,Math.PI*2);G.stroke();

function drawEditGrid(){
  const {S}=getLay();
  const {cw,ch,ox,oy}=gridCell();
  // Grid çizgileri (kesikli, altın)
  G.strokeStyle='rgba(245,200,66,0.35)';
  G.lineWidth=1;
  G.setLineDash([S*0.8,S*0.7]);
  for(let c=0;c<=GRID_COLS;c++){
    G.beginPath();G.moveTo(ox+c*cw,oy);G.lineTo(ox+c*cw,oy+GRID_ROWS*ch);G.stroke();
  }
  for(let r=0;r<=GRID_ROWS;r++){
    G.beginPath();G.moveTo(ox,oy+r*ch);G.lineTo(ox+GRID_COLS*cw,oy+r*ch);G.stroke();
  }
  G.setLineDash([]);
  // Dolu hücreler (masalar yeşil, dekorlar mor)
  tables.forEach((t,i)=>{
    if(i>=tableCount||(dragKind==='table'&&i===dragIdx))return;
    G.fillStyle='rgba(100,200,120,0.08)';
    G.fillRect(ox+t.gc*cw,oy+t.gr*ch,cw,ch);
  });
  wallD.forEach((d,i)=>{
    if(d.gc===undefined||(dragKind==='deco'&&i===dragIdx))return;
    G.fillStyle='rgba(170,110,230,0.10)';
    G.fillRect(ox+d.gc*cw,oy+d.gr*ch,cw,ch);
  });
  // Sürükleme hedef hücresi (yeşil=boş, kırmızı=dolu)
  if(dragIdx>=0){
    let c=Math.floor((dragPX-ox)/cw), rr=Math.floor((dragPY-oy)/ch);
    c=Math.max(0,Math.min(GRID_COLS-1,c));
    rr=Math.max(0,Math.min(GRID_ROWS-1,rr));
    const occupied=cellTaken(c,rr,dragKind==='table'?dragIdx:-1,dragKind==='deco'?dragIdx:-1);
    G.fillStyle=occupied?'rgba(220,60,60,0.28)':'rgba(80,220,120,0.28)';
    G.fillRect(ox+c*cw,oy+rr*ch,cw,ch);
    G.strokeStyle=occupied?'#e05050':'#50d080';
    G.lineWidth=S*0.4;
    G.strokeRect(ox+c*cw,oy+rr*ch,cw,ch);
  }
  // Üst bilgi bandı
  G.fillStyle='rgba(0,0,0,0.6)';
  const {RX,FY,RW}=getLay();
  G.beginPath();G.roundRect(RX+RW/2-S*17,FY+S*0.3,S*34,S*2,S*0.4);G.fill();
  G.fillStyle='#f5c842';
  G.font=`bold ${S*0.82}px 'Press Start 2P',monospace`;
  G.textAlign='center';G.textBaseline='middle';
  G.fillText('✏️ MASA & DEKOR SÜRÜKLE — DEKORU YUKARI AT = SAT',RX+RW/2,FY+S*1.3);
}

cv.addEventListener('pointerdown',e=>{
  if(!editMode)return;
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  const {S}=getLay();
  // Önce masalar (büyük hedef)
  for(let i=tableCount-1;i>=0;i--){
    const t=tables[i]; if(!t.w)continue;
    if(mx>=t.x-S&&mx<=t.x+t.w+S&&my>=t.y-S*3.5&&my<=t.y+t.h+S*3.5){
      dragKind='table'; dragIdx=i; dragPX=mx; dragPY=my;
      try{cv.setPointerCapture(e.pointerId);}catch(_){}
      e.preventDefault();
      return;
    }
  }
  // Sonra dekorlar
  const {cw,ch,ox,oy}=gridCell();
  for(let i=wallD.length-1;i>=0;i--){
    const d=wallD[i]; if(d.gc===undefined)continue;
    const px=ox+d.gc*cw+cw/2, py=oy+d.gr*ch+ch*0.62;
    if(mx>=px-S*3&&mx<=px+S*3&&my>=py-S*5&&my<=py+S*1.5){
      dragKind='deco'; dragIdx=i; dragPX=mx; dragPY=my;
      try{cv.setPointerCapture(e.pointerId);}catch(_){}
      e.preventDefault();
      return;
    }
  }
});

cv.addEventListener('pointerup',e=>{
  if(!editMode||dragIdx<0)return;
  const {cw,ch,ox,oy}=gridCell();
  const inGrid = dragPY >= oy - ch*0.2;
  let c=Math.floor((dragPX-ox)/cw), rr=Math.floor((dragPY-oy)/ch);
  c=Math.max(0,Math.min(GRID_COLS-1,c));
  rr=Math.max(0,Math.min(GRID_ROWS-1,rr));
  if(dragKind==='table'){
    if(!cellTaken(c,rr,dragIdx,-1)){
      tables[dragIdx].gc=c; tables[dragIdx].gr=rr;
    } else notify('❌ O hücre dolu!');
  } else {
    const d=wallD[dragIdx];
    if(!inGrid){
      // Mutfağa/dışarı sürüklendi → sat (%50)

      coins+=sell; decoB=Math.max(0,decoB-(d.b||0));

      hudU();
    } else if(!cellTaken(c,rr,-1,dragIdx)){
      d.gc=c; d.gr=rr;
    } else notify('❌ O hücre dolu!');
  }
  dragIdx=-1; dragKind='table';
});

function endDay(){
  dayT=0;
  const salaries=workers.reduce((s,w)=>s+(w.isOwner?0:w.sal),0);
  let report=[];
  let totalExp=0;

  // 0. Utility giderleri (ocak + masa bakım) — Gün 2+
  if(isFeatureUnlocked('wages')){
    const gasCost = stoveCount * 30;       // ocak başına 30G/gün
    const tableMaint = tableCount * 10;    // masa başına 10G/gün
    const utilityCost = gasCost + tableMaint;
    if(coins >= utilityCost){
      coins -= utilityCost;
      logF('e', '⚡ Gaz/Elektrik ('+stoveCount+' ocak)', gasCost);
      logF('e', '🪑 Masa bakım ('+tableCount+' masa)', tableMaint);
      report.push({icon:'⚡', label:'Gaz & Elektrik ('+stoveCount+'×30G)', val:-gasCost, bad:true});
      report.push({icon:'🔧', label:'Masa bakım ('+tableCount+'×10G)', val:-tableMaint, bad:true});
    } else {
      happy = Math.max(0, happy - 10);
      notify('⚡ Faturalar ödenemedi!');
      report.push({icon:'⚡', label:'Faturalar ÖDENEMEDİ!', val:-(gasCost+tableMaint), bad:true});
    }
    totalExp += utilityCost;
  }

  // 1. Maaşlar (Gün 2+)
  if(isFeatureUnlocked('wages')){
    if(coins>=salaries){
      coins-=salaries;logF('e','👥 Maaşlar',salaries);
      workers.forEach(w=>{w.days++;w.earned=(w.earned||0)+w.sal;});
      report.push({icon:'👥',label:'Maaşlar ('+workers.length+' kişi)',val:-salaries,bad:true});
    } else {
      notify('⚠️ MAAS ODENEMEDI!');happy=Math.max(0,happy-25);
      report.push({icon:'⚠️',label:'Maaş ÖDENEMEDİ',val:-salaries,bad:true});
    }
    totalExp+=salaries;
  } else {
    report.push({icon:'🎁',label:'Maaşlar (Gun 2 aktif)',val:0,bad:false});
    workers.forEach(w=>{w.days++;});
  }

  // 3. Malzeme bozulma (Gün 3+)
  if(isFeatureUnlocked('spoilage')){
    const spoiledBatches = spoilIngredients();
    recalcAllIng();
    if(spoiledBatches.length>0){
      const spoilText = spoiledBatches.map(s=>s.e+' -'+s.qty).join(', ');
      report.push({icon:'🗑️',label:'Bozulan: '+spoilText,val:0,bad:true});
    }
  } else {
    report.push({icon:'🎁',label:'Bozulma (Gun 3 aktif)',val:0,bad:false});
  }

  // 4. Günlük gelir
  report.push({icon:'💰',label:'Bugünkü gelir',val:dailyInc,bad:false});

  // 4b. Muhasebeci varsa günlük ücreti öde
  if(hasAccountant){
    if(coins>=accountantCost){
      coins-=accountantCost;
      logF('e','📊 Muhasebeci',accountantCost);
      report.push({icon:'📊',label:'Muhasebeci ücreti',val:-accountantCost,bad:true});
      totalExp+=accountantCost;
    } else {
      hasAccountant=false;
      notify('📊 Muhasebeci ayrıldı - para yok!');
    }
  }

  // 5. Net hesap
  const net=dailyInc-totalExp;
  report.push({icon:net>=0?'📈':'📉',label:'NET KAR/ZARAR',val:net,bad:net<0});

  // 6. Save report & reset daily
  prevDayReport={day:dayNum,inc:dailyInc,exp:totalExp,net,items:report};
  dayNum++;
  dailyInc=0;dailyExp=0;dailyLog=[];

  // 7. Kira artışı (her 5 günde bir)
  if(dayNum%5===0){rent=Math.round(rent*1.1);notify('📈 Kira arttı! Yeni kira: '+rent+'G');}

  hudU();buildWB();
  showDayReport(prevDayReport);
}

let sfxOn = true;
try{ sfxOn = localStorage.getItem('dinerempire_sfx')!=='0'; }catch(e){}
let _actx=null;
function _ac(){
  if(!_actx){ try{_actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(_actx&&_actx.state==='suspended'){ _actx.resume().catch(()=>{}); }
  return _actx;
}
function tone(f,dur,type,vol,when,slide){
  const a=_ac(); if(!a)return;
  const t0=a.currentTime+(when||0);
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'square';
  o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(vol||0.12,t0);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
  o.connect(g);g.connect(a.destination);
  o.start(t0);o.stop(t0+dur+0.02);
}
function sfx(name){
  if(!sfxOn)return;
  try{
    switch(name){
      case 'coin':   tone(880,0.07,'square',0.10); tone(1318,0.12,'square',0.10,0.06); break;
      case 'serve':  tone(660,0.09,'triangle',0.14); tone(990,0.15,'triangle',0.12,0.08); break;
      case 'angry':  tone(220,0.28,'sawtooth',0.10,0,110); break;
      case 'unlock': [523,659,784,1046].forEach((f,i)=>tone(f,0.13,'triangle',0.11,i*0.09)); break;
      case 'day':    tone(392,0.15,'triangle',0.12); tone(523,0.22,'triangle',0.12,0.12); break;
    }
  }catch(e){}
}

  try{
    const data={v:1,savedAt:Date.now(),

      menu:[...menu],

      extIds:extItems.map(x=>x.id),

    try{data.extPop=extPop;data.extHap=extHap;}catch(e){}

    const tInfo = REST_TYPES[meta.type]||{icon:'🍽️',name:''};
    const cc = document.createElement('div');
    cc.style.cssText = 'background:#152415;border:2px solid #4cb84c;border-radius:8px;padding:16px;width:160px;cursor:pointer;text-align:center;transition:all .2s;';
    cc.innerHTML = '<div style="font-size:32px;margin-bottom:8px">💾</div>'
      + '<div style="font-size:9px;font-weight:bold;color:#6ee06e;font-family:\'Press Start 2P\',monospace">DEVAM ET</div>'
      + '<div style="font-size:7px;color:#9c9;margin-top:6px">'+tInfo.icon+' Gün '+meta.day+' • '+meta.coins+'G</div>'
      + '<div id="del-save" style="font-size:6px;color:#688;margin-top:8px;text-decoration:underline">kaydı sil</div>';
    cc.onclick = loadGame;
    cc.querySelector('#del-save').onclick = function(ev){ ev.stopPropagation(); deleteSave(); };
    container.prepend(cc);
  }

}

function selectRestType(key) {
  restType = key;
  const t = REST_TYPES[key];
  coins = t.startCoins;
  initEarlyStock();
  // Başlangıç masa sayısını ayarla
  tableCount = restType==='fastfood' ? 4 : restType==='finedining' ? 2 : 3;
  stoveCount = 1;
  document.getElementById('start-screen').style.display = 'none';
  // Notify
  notify(t.icon + ' ' + t.name + ' açıldı! Başlangıç: ' + t.startCoins + 'G');
  hudU();
  buildWB();
  restartCustSpawn();
}
